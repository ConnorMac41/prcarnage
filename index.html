    resumeGame() {
      if (!this.paused) return;
      this.paused = false;
      if (this.pauseContainer) {
        this.pauseContainer.destroy(); this.pauseContainer = null;
      }
      // Don't resume physics if quick-switch is somehow open
      if (!this.quickSwitchOpen) {
        this.physics.world.resume();
        this.tweens.resumeAll();
      }
    }

    setupCollisions() {
      // Player vs ground/platforms — keep handle to platform collider so the
      // Charlie Fatter powerup can disable it (Charlie can't reach platforms).
      this.physics.add.collider(this.player, this.groundBody);
      this.playerPlatformCollider =
        this.physics.add.collider(this.player, this.platforms);

      // Enemies vs ground/platforms
      this.physics.add.collider(this.enemies, this.groundBody);
      this.physics.add.collider(this.enemies, this.platforms);

      // Bullets vs ground/platforms (destroy on hit)
      const hitSolid = (b) => {
        this.sparkFX.emitParticleAt(b.x, b.y, 5);
        b.destroy();
      };
      this.physics.add.collider(this.bullets, this.groundBody, hitSolid);
      this.physics.add.collider(this.bullets, this.platforms, hitSolid);
      this.physics.add.collider(this.enemyBullets, this.groundBody, hitSolid);
      this.physics.add.collider(this.enemyBullets, this.platforms, hitSolid);

      // v6: Grenades bounce off ground/platforms (don't destroy on impact)
      this.physics.add.collider(this.grenades, this.groundBody);
      this.physics.add.collider(this.grenades, this.platforms);

      // Bullet vs enemy — bullet carries its own damage (tongue = 9999, normal = playerDmg)
      this.physics.add.overlap(this.bullets, this.enemies, (bullet, enemy) => {
        const data = this.enemyData.get(enemy);
        if (!data || !data.alive) return;
        const dmg = (bullet.damage != null) ? bullet.damage : this.playerState.damage;
        this.damageEnemy(enemy, dmg, bullet.x, bullet.y);
        // Tongue keeps going through? No — destroy on hit for clean feedback.
        bullet.destroy();
      });

      // Enemy bullet vs player
      this.physics.add.overlap(this.enemyBullets, this.player, (player, bullet) => {
        if (this.gameOver) return;
        if (this.playerState.invincibleUntil > this.time.now) return;
        this.damagePlayer(10);
        this.bloodFX.emitParticleAt(bullet.x, bullet.y, 6);
        bullet.destroy();
      });

      // Enemy touch — varies by active powerup
      this.physics.add.overlap(this.player, this.enemies, (player, enemy) => {
        if (this.gameOver) return;
        const data = this.enemyData.get(enemy);
        if (!data || !data.alive) return;

        // Aaron Goblin — contact kills any enemy + MINE! popup
        if (this.powerupActive && this.powerupKind === 'aaron') {
          const dir = Math.sign(enemy.x - player.x) || 1;
          this.killEnemy(enemy, dir);
          this.showFloatingText(enemy.x, enemy.y - 30, 'MINE!', '#88ff44');
          return;
        }

        // v5 Finley Guinness Hero — contact kills enemies (player is
        // already invincible while powerup is active, so no damage taken)
        if (this.powerupActive && this.powerupKind === 'finley') {
          const dir = Math.sign(enemy.x - player.x) || 1;
          this.killEnemy(enemy, dir);
          this.showFloatingText(enemy.x, enemy.y - 30, 'CHEERS!', '#ffdd33');
          return;
        }

        // Charlie Fatter — enemy knocked back hard and killed; player is unharmed
        if (this.powerupActive && this.powerupKind === 'charlie') {
          const dir = Math.sign(enemy.x - player.x) || 1;
          this.killEnemy(enemy, dir);
          // Boost the ragdoll launch for a satisfying punt
          const d = this.enemyData.get(enemy);
          if (d) {
            d.ragdollVx = dir * 700;
            d.ragdollVy = -480;
            d.ragdollRot = dir * 9;
          }
          this.cameras.main.shake(120, 0.005);
          return;
        }

        // Default: invincible window blocks damage (Finley's Guinness sets a long one)
        if (this.playerState.invincibleUntil > this.time.now) return;
        this.damagePlayer(data.touchDmg);
        this.playerState.invincibleUntil = this.time.now + 600;
        // Knockback
        const dir = Math.sign(this.player.x - enemy.x) || 1;
        this.player.setVelocityX(280 * dir);
        this.player.setVelocityY(-220);
      });

      // Powerup pickup
      this.physics.add.overlap(this.player, this.powerupOrb, () => {
        if (this.powerupOrb.visible && !this.powerupHeld && !this.powerupActive) {
          this.powerupHeld = true;
          this.powerupOrb.setVisible(false);
          this.powerupOrb.setActive(false);
          // Respawn later
          this.time.delayedCall(18000, () => this.respawnPowerup());
          // Grab visual
          this.cameras.main.flash(120, 255, 200, 80);
        }
      });
    }

    setupCamera() {
      this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
      this.cameras.main.setDeadzone(120, 80);
    }

    // -----------------------------------------------------------------------
    // UPDATE LOOP
    // -----------------------------------------------------------------------
    update(time, delta) {
      if (this.gameOver) return;
      // v6: skip everything when paused or the quick switch overlay is up
      if (this.paused || this.quickSwitchOpen) return;

      // Current effective time factor (for custom non-physics logic)
      const timeScale = this.bulletTimeActive ? BULLET_TIME_FACTOR : 1.0;
      const eDelta = delta * timeScale; // effective delta for manual systems

      this.updateBulletTime(delta, timeScale);
      this.updatePlayer(delta, eDelta, time);
      this.updateEnemies(delta, eDelta, time);
      this.updateBullets();
      this.updateRain(eDelta);
      this.updatePuddles(delta);
      this.updatePowerupActive(eDelta);
      this.updateHUD();
      this.checkWaveProgress();
    }

    // -----------------------------------------------------------------------
    updateBulletTime(delta, timeScale) {
      const wantActive =
        this.keys.bulletTime.isDown &&
        this.bulletTimeEnergy > 15 &&
        !this.bulletTimeActive;
      const wantStop =
        (!this.keys.bulletTime.isDown || this.bulletTimeEnergy <= 0) &&
        this.bulletTimeActive;

      if (wantActive) this.enterBulletTime();
      if (wantStop)   this.exitBulletTime();

      // Drain / regen
      const dt = delta / 1000;
      if (this.bulletTimeActive) {
        this.bulletTimeEnergy -= BULLET_TIME_DRAIN * dt;
        if (this.bulletTimeEnergy < 0) this.bulletTimeEnergy = 0;
      } else {
        this.bulletTimeEnergy += BULLET_TIME_REGEN * dt;
        if (this.bulletTimeEnergy > 100) this.bulletTimeEnergy = 100;
      }

      // v5: only animate the dark-blue edge vignette — full colour preserved
      const targetVig = this.bulletTimeActive ? 0.92 : 0;
      const lerp = (a, b, t) => a + (b - a) * t;
      const k = Math.min(1, delta / 160);
      this.vignette.alpha = lerp(this.vignette.alpha, targetVig, k);
    }

    enterBulletTime() {
      this.bulletTimeActive = true;
      // Slow physics world (higher timeScale = slower simulation)
      this.physics.world.timeScale = 1 / BULLET_TIME_FACTOR;
      this.tweens.timeScale = BULLET_TIME_FACTOR;
      // Deep whoosh via camera shake and slight zoom
      this.cameras.main.shake(120, 0.003);
      this.cameras.main.zoomTo(1.08, 250, 'Sine.easeOut');
    }

    exitBulletTime() {
      this.bulletTimeActive = false;
      this.physics.world.timeScale = 1;
      this.tweens.timeScale = 1;
      this.cameras.main.zoomTo(1.0, 250, 'Sine.easeOut');
    }

    // -----------------------------------------------------------------------
    updatePlayer(delta, eDelta, time) {
      const ps = this.playerState;
      const body = this.player.body;

      // Track grounded for coyote time
      const onGround = body.blocked.down || body.touching.down;
      if (onGround) {
        ps.lastGroundedAt = time;
        // v6: refill jumps when touching the ground (or any platform top)
        ps.maxJumps = (this.powerupActive && this.powerupKind === 'declan') ? 3 : 2;
        ps.jumpsRemaining = ps.maxJumps;
      }

      // Horizontal input
      const left = this.keys.left.isDown;
      const right = this.keys.right.isDown;

      // Slide detection (edge on S + direction, only while on ground and moving)
      const sNow = this.keys.down.isDown;
      const sJustPressed = sNow && !this.sWasDown;
      this.sWasDown = sNow;

      // Crouching vs sliding
      if (!ps.isSliding) {
        if (sJustPressed && onGround && (left || right)) {
          // Enter slide
          ps.isSliding = true;
          ps.slideEndsAt = time + SLIDE_MS;
          const dir = right ? 1 : -1;
          ps.facing = dir;
          this.player.setVelocityX(dir * SLIDE_VEL);
          // Lower hitbox
          this.player.body.setSize(28, 30);
          this.player.body.setOffset(11, 38);
          this.player.setRotation(dir * 0.25);
          this.cameras.main.shake(60, 0.002);
        } else if (sNow && onGround) {
          ps.isCrouching = true;
        } else {
          ps.isCrouching = false;
        }
      }

      // End slide on timeout or if leaves ground
      if (ps.isSliding && (time >= ps.slideEndsAt || !onGround)) {
        ps.isSliding = false;
        this.player.body.setSize(28, 56);
        this.player.body.setOffset(11, 12);
        this.player.setRotation(0);
      }

      // Horizontal movement — speed multiplier varies per active powerup
      let speedMul = 1;
      if (this.powerupActive) {
        switch (this.powerupKind) {
          case 'connor':  speedMul = 1.5; break;  // Gangster +50%
          case 'callum':  speedMul = 2.0; break;  // Chow double speed
          case 'finley':  speedMul = 0.7; break;  // v5: Guinness Hero — slower
          case 'declan':  speedMul = 1.0; break;  // Frog — jump bonus only
          case 'aaron':   speedMul = 2.0; break;  // Goblin — double speed
          case 'charlie': speedMul = 0.5; break;  // Fatter — waddle slowly
        }
      }
      if (ps.isCrouching)     speedMul = 0.45;
      if (ps.isSliding)       speedMul = 0; // don't override slide velocity

      if (!ps.isSliding) {
        if (left) {
          this.player.setVelocityX(-ps.baseSpeed * speedMul);
          ps.facing = -1;
          this.player.setFlipX(true);
        } else if (right) {
          this.player.setVelocityX(ps.baseSpeed * speedMul);
          ps.facing = 1;
          this.player.setFlipX(false);
        } else {
          // friction
          this.player.setVelocityX(this.player.body.velocity.x * 0.8);
        }
      }

      // Jump + dive + coyote time
      const jumpPressed =
        this.keys.jump.isDown || this.keys.up.isDown;
      const jumpJustPressed = jumpPressed && !this.jumpWasDown;
      this.jumpWasDown = jumpPressed;

      // Charlie can't jump while in Fatter mode
      const jumpBlocked = this.powerupActive && this.powerupKind === 'charlie';

      if (jumpJustPressed && !jumpBlocked) {
        ps.lastJumpPressedAt = time;

        // v6: full-height double jump system.
        // - First jump: grounded OR coyote (uses one charge)
        // - Second jump: in air with charge remaining (full height)
        // - Frog mode allows 3 jumps total (set in onGround branch)
        const inCoyote = (time - ps.lastGroundedAt) <= COYOTE_MS;
        const canFirstJump = onGround || inCoyote;
        const canAirJump = !onGround && ps.jumpsRemaining > 0;

        const jumpVel =
          (this.powerupActive && this.powerupKind === 'declan')
            ? JUMP_VEL * 1.15  // slight boost in Frog mode
            : JUMP_VEL;

        if (canFirstJump || canAirJump) {
          this.player.setVelocityY(jumpVel);
          ps.jumpsRemaining -= 1;
          // Coyote first-jump still costs a charge
          if (inCoyote && !onGround) ps.jumpsRemaining = Math.max(0, ps.jumpsRemaining - 0);
          // Quick spark on the second jump for feedback
          if (!onGround) {
            this.sparkFX.emitParticleAt(this.player.x, this.player.y + 18, 6);
          }
          // Slide cancels into a jump
          if (ps.isSliding) {
            ps.isSliding = false;
            this.player.body.setSize(28, 56);
            this.player.body.setOffset(11, 12);
            this.player.setRotation(0);
          }
        }
      }

      // v6: pressing S while airborne fast-falls THROUGH a one-way platform
      // by briefly disabling top collision on platforms the player is on.
      if (sNow && !onGround && this.playerPlatformCollider &&
          this.playerPlatformCollider.active) {
        // Soft drop: nudge down so we slip past the next one-way platform
        if (this.player.body.velocity.y < 0) this.player.setVelocityY(60);
      }

      // After a dive, restore rotation once on ground
      if (onGround && !ps.isSliding && this.player.rotation !== 0) {
        this.player.setRotation(0);
      }

      // v5 Charlie Fatter: clamp to ground level — even if knocked up, snap
      // back down so he can't reach platforms.
      if (this.powerupActive && this.powerupKind === 'charlie') {
        if (this.player.y < GROUND_Y - 50) {
          this.player.y = GROUND_Y - 50;
          this.player.body.velocity.y = Math.max(0, this.player.body.velocity.y);
        }
      }

      // v5 Connor: position + rotate the visible gun arm to follow the mouse
      if (this.connorArm && this.selectedCharacter === 'connor') {
        const ptr = this.input.activePointer;
        const wx = ptr.worldX, wy = ptr.worldY;
        const ang = Math.atan2(wy - this.player.y, wx - this.player.x);
        this.connorArm.x = this.player.x;
        this.connorArm.y = this.player.y - 4;
        this.connorArm.rotation = ang;
        this.connorArm.setVisible(true);
      } else if (this.connorArm) {
        this.connorArm.setVisible(false);
      }

      // Powerup activation
      const eNow = this.keys.powerup.isDown;
      const eJust = eNow && !this.eWasDown;
      this.eWasDown = eNow;
      if (eJust && this.powerupHeld && !this.powerupActive) {
        this.activatePowerup();
      }

      // Frog tongue — F key during Frog mode only
      const fNow = this.keys.tongue.isDown;
      const fJust = fNow && !this.fWasDown;
      this.fWasDown = fNow;
      if (fJust && this.powerupActive && this.powerupKind === 'declan') {
        this.shootTongue();
      }

      // Invincibility flicker — but Finley's invincible glow shouldn't flicker
      const finleyInv = this.powerupActive && this.powerupKind === 'finley';
      if (ps.invincibleUntil > time && !finleyInv) {
        this.player.setAlpha(Math.floor(time / 60) % 2 ? 0.4 : 1);
      } else {
        this.player.setAlpha(1);
      }
    }

    // -----------------------------------------------------------------------
    updateEnemies(delta, eDelta, time) {
      for (const [enemy, data] of this.enemyData.entries()) {
        if (!data.alive) {
          // Ragdoll — apply custom physics-free motion
          enemy.y += data.ragdollVy * (eDelta / 1000);
          enemy.x += data.ragdollVx * (eDelta / 1000);
          data.ragdollVy += 300 * (eDelta / 1000); // slow fall
          enemy.rotation += data.ragdollRot * (eDelta / 1000);
          if (enemy.y > GROUND_Y + 40) {
            // Settle on ground
            enemy.y = GROUND_Y + 40;
            data.ragdollVy = 0;
            data.ragdollVx *= 0.85;
            data.ragdollRot *= 0.9;
          }
          continue;
        }

        const px = this.player.x;
        const ex = enemy.x;
        const dx = px - ex;
        const dist = Math.abs(dx);
        const dir = Math.sign(dx) || 1;
        const stats = ENEMY_STATS[data.type];

        // Use the per-enemy scaled speed (set at spawn time)
        const sp = data.speed;

        // v6: Platform-jump AI — if the player is significantly above this
        // enemy and the enemy is grounded, jump to try to reach them.
        const playerAbove = (this.player.y < enemy.y - 60);
        const onSomething = enemy.body.blocked.down || enemy.body.touching.down;
        if (playerAbove && onSomething && time > data.nextAiJumpAt && dist < 600) {
          enemy.setVelocityY(-520);
          data.nextAiJumpAt = time + 800 + Math.random() * 600;
        }

        // v6: Grenade throw — wave 4+, on cooldown, when at moderate range.
        if (waveCanGrenade(data.wave || this.wave) &&
            data.type !== 'hoodie' && time > data.nextGrenadeAt &&
            dist > 200 && dist < 700 && onSomething) {
          this.enemyThrowGrenade(enemy);
          data.nextGrenadeAt = time + 5500 + Math.random() * 4000;
        }

        // Type-specific AI
        if (data.type === 'chav') {
          if (dist < 480) {
            enemy.setFlipX(dx < 0);
            if (time - data.lastShotAt > 1600) {
              data.lastShotAt = time;
              this.enemyShoot(enemy, dir);
            }
            enemy.setVelocityX(dir * sp * 0.4);
          } else {
            if (enemy.x < data.patrolOrigin - 80) data.patrolDir = 1;
            if (enemy.x > data.patrolOrigin + 80) data.patrolDir = -1;
            enemy.setVelocityX(data.patrolDir * sp * 0.6);
            enemy.setFlipX(data.patrolDir < 0);
          }
        } else if (data.type === 'bouncer') {
          if (dist < 300) {
            enemy.setVelocityX(dir * sp * 2.2);
            enemy.setFlipX(dx < 0);
          } else if (dist < 600) {
            enemy.setVelocityX(dir * sp * 0.6);
            enemy.setFlipX(dx < 0);
          } else {
            enemy.setVelocityX(0);
          }
        } else if (data.type === 'hoodie') {
          if (time > data.nextActionAt) {
            data.nextActionAt = time + 200 + Math.random() * 300;
            data.patrolDir = dir;
            if (onSomething && Math.random() > 0.7) {
              enemy.setVelocityY(-420);
            }
          }
          enemy.setVelocityX(dir * sp);
          enemy.setFlipX(dx < 0);
        }
      }
    }

    enemyShoot(enemy, dir) {
      const bx = enemy.x + dir * 22;
      const by = enemy.y - 4;
      // v6: aim straight at the player (no gravity drop)
      const dxp = this.player.x - bx;
      const dyp = this.player.y - by;
      const d = Math.max(20, Math.hypot(dxp, dyp));
      const nx = dxp / d, ny = dyp / d;
      const b = this.enemyBullets.create(bx, by, 'enemy_bullet');
      b.setVelocity(nx * 600, ny * 600);
      b.body.setSize(10, 10).setOffset(3, 3);
      b.isEnemy = true;
      b.startX = bx; b.startY = by;
      b.maxRange = BULLET_MAX_RANGE;
      this.enemyMuzzleFX.emitParticleAt(bx, by, 4);
      this.time.delayedCall(2200, () => { if (b.active) b.destroy(); });
    }

    // v6: Throw a grenade at the player — flashing red circle that arcs
    // through the air and explodes after 2 seconds, dealing radius damage.
    enemyThrowGrenade(enemy) {
      const dxp = this.player.x - enemy.x;
      const dir = Math.sign(dxp) || 1;
      const g = this.grenades.create(enemy.x + dir * 16, enemy.y - 12, 'grenade');
      g.body.setSize(12, 12).setOffset(2, 2);
      g.setBounce(0.4);
      g.setCollideWorldBounds(true);
      // Lobbed toward the player — clamp to a reasonable arc
      const power = Math.min(900, Math.abs(dxp) * 1.6);
      g.setVelocityX(dir * Math.max(180, power * 0.6));
      g.setVelocityY(-360 - Math.random() * 80);
      // Flashing tint while ticking down
      g.flashTween = this.tweens.add({
        targets: g, alpha: { from: 1, to: 0.4 },
        duration: 140, yoyo: true, repeat: -1,
      });
      // Detonate after 2 seconds
      this.time.delayedCall(2000, () => this.explodeGrenade(g));
    }

    // v6: Explode a grenade — radius damage if player is close
    explodeGrenade(g) {
      if (!g.active) return;
      const ex = g.x, ey = g.y;
      // Visual blast
      this.bloodFX.emitParticleAt(ex, ey, 14);
      this.muzzleFX.emitParticleAt(ex, ey, 18);
      const blast = this.add.graphics();
      blast.fillStyle(0xff4400, 0.7); blast.fillCircle(ex, ey, 60);
      blast.fillStyle(0xffaa22, 0.5); blast.fillCircle(ex, ey, 40);
      blast.fillStyle(0xffffaa, 0.7); blast.fillCircle(ex, ey, 20);
      this.tweens.add({
        targets: blast, alpha: 0, duration: 350,
        onComplete: () => blast.destroy(),
      });
      this.cameras.main.shake(220, 0.012);
      // Radius damage on player
      const dx = this.player.x - ex, dy = this.player.y - ey;
      const dist = Math.hypot(dx, dy);
      if (dist < 80 && this.playerState.invincibleUntil <= this.time.now) {
        this.damagePlayer(28);
        const kx = Math.sign(dx) || 1;
        this.player.setVelocity(kx * 360, -300);
      }
      g.destroy();
    }

    // v6: emit trails AND enforce BULLET_MAX_RANGE — bullets that have
    // travelled more than maxRange pixels disappear. Range falloff makes
    // bullets fade in alpha as they approach max range (shotgun feel).
    updateBullets() {
      const trailMul = this.bulletTimeActive ? 2 : 1;
      this.bullets.getChildren().forEach(b => {
        if (b.x < -50 || b.x > WORLD_W + 50 || b.y > GH + 100) {
          b.destroy(); return;
        }
        // Distance traveled since spawn
        if (b.startX != null) {
          const dist = Math.hypot(b.x - b.startX, b.y - b.startY);
          if (dist > (b.maxRange || BULLET_MAX_RANGE)) {
            b.destroy(); return;
          }
          // Range falloff — fade out as we approach max range
          const t = dist / (b.maxRange || BULLET_MAX_RANGE);
          if (t > 0.6) b.setAlpha(Math.max(0.15, 1 - (t - 0.6) * 2));
        }
        if (!b.isTongue) {
          this.bulletTrailFX.emitParticleAt(b.x, b.y, trailMul);
        }
      });
      this.enemyBullets.getChildren().forEach(b => {
        if (b.x < -50 || b.x > WORLD_W + 50 || b.y > GH + 100) {
          b.destroy(); return;
        }
        if (b.startX != null) {
          const dist = Math.hypot(b.x - b.startX, b.y - b.startY);
          if (dist > (b.maxRange || BULLET_MAX_RANGE)) {
            b.destroy(); return;
          }
        }
        this.enemyTrailFX.emitParticleAt(b.x, b.y, trailMul);
      });
    }

    // -----------------------------------------------------------------------
    updateRain(eDelta) {
      // In bullet time, rain visibly slows
      const dtSec = eDelta / 1000;
      const g = this.rainGfx;
      g.clear();
      const color = this.bulletTimeActive ? 0x88bbee : 0x6688bb;
      const alpha = this.bulletTimeActive ? 0.55 : 0.32;
      g.lineStyle(1, color, alpha);
      for (const r of this.rain) {
        r.y += r.v * dtSec;
        r.x -= 40 * dtSec; // slight diagonal
        if (r.x < -20) r.x = GW + 20;
        // Splash when the drop reaches the street surface (screen y ~= ground y)
        if (r.y > GROUND_Y) {
          const worldX = this.cameras.main.scrollX + r.x;
          if (Math.random() > 0.55) {
            // Burst of 1-2 small white splashes at the impact point
            this.splashFX.emitParticleAt(worldX, GROUND_Y + 2, 1 + Math.floor(Math.random() * 2));
          }
          r.y = -10;
          r.x = Math.random() * GW;
          r.v = 720 + Math.random() * 360;
        }
        g.lineBetween(r.x, r.y, r.x - 4, r.y + r.len);
      }
    }

    // -----------------------------------------------------------------------
    updatePuddles(delta) {
      // Neon reflections in puddles — animate alpha subtly
      const t = this.time.now / 600;
      this.puddles.forEach(p => {
        p.g.alpha = 0.6 + 0.2 * Math.sin(t + p.phase);
      });
    }

    // -----------------------------------------------------------------------
    // POWERUPS — per-character activate/deactivate/update.
    // -----------------------------------------------------------------------
    updatePowerupActive(eDelta) {
      if (!this.powerupActive) return;
      this.powerupTimer -= eDelta;

      // Per-frame visuals/logic by character
      const px = this.player.x, py = this.player.y;
      switch (this.powerupKind) {
        case 'callum': {
          // Auto-melee every 500ms — kill any enemy within 120px
          this.chowMeleeTimer = (this.chowMeleeTimer || 0) - eDelta;
          if (this.chowMeleeTimer <= 0) {
            this.chowMeleeTimer = 500;
            let killed = 0;
            for (const [enemy, data] of this.enemyData.entries()) {
              if (!data.alive) continue;
              const dx = enemy.x - px, dy = enemy.y - py;
              if (Math.hypot(dx, dy) < 120) {
                this.killEnemy(enemy, Math.sign(dx) || 1);
                killed += 1;
              }
            }
            if (killed > 0) {
              this.showFloatingText(px, py - 50, 'CHOW!', '#ffaa22');
              this.cameras.main.shake(60, 0.003);
            }
          }
          break;
        }
        case 'finley': {
          // v5: Keep invincibility refreshed; reposition pint, glow, and the
          // floating "INVINCIBLE" text above Finley's head each frame.
          this.playerState.invincibleUntil = this.time.now + 200;
          const facing = this.playerState.facing || 1;
          if (this.finleyPint) {
            this.finleyPint.x = px + facing * 14;
            this.finleyPint.y = py + 4;
          }
          if (this.finleyGlow) {
            this.finleyGlow.x = px;
            this.finleyGlow.y = py;
            this.finleyGlow.alpha = 0.65 + 0.35 * Math.sin(this.time.now / 90);
          }
          if (this.finleyInvText) {
            this.finleyInvText.x = px;
            this.finleyInvText.y = py - 56;
            this.finleyInvText.alpha = 0.7 + 0.3 * Math.sin(this.time.now / 140);
          }
          break;
        }
        case 'charlie': {
          // Stays invincible the whole duration
          this.playerState.invincibleUntil = this.time.now + 200;
          break;
        }
      }

      if (this.powerupTimer <= 0) {
        this.deactivatePowerup();
      }
    }

    activatePowerup() {
      const charId = this.selectedCharacter;
      this.powerupActive = true;
      this.powerupHeld = false;
      this.powerupKind = charId;
      this.powerupTimer = POWERUP_DURATION[charId] || 6000;
      this.powerupMax = this.powerupTimer;

      // v5 Common activation flair: bright flash + zoom punch + a big
      // "POWERUP!" text that pops above the player and fades.
      this.cameras.main.flash(300, 255, 220, 80);
      this.cameras.main.zoomTo(1.06, 120, 'Sine.easeOut');
      this.time.delayedCall(150, () => this.cameras.main.zoomTo(1.0, 180));
      this.showFloatingText(this.player.x, this.player.y - 80,
        'POWERUP!', '#ffee44');

      // Per-character visuals
      switch (charId) {
        case 'connor':
          // v5 Gangster Mode: sunglasses + dark navy outfit + gold chain.
          // No yellow tint — colour comes entirely from the texture itself.
          this.player.setTexture('player_connor_gangster');
          this.player.clearTint();
          break;
        case 'callum':
          // Red tint, fast aura — auto-melee handled per-frame
          this.player.setTint(0xff8866);
          this.chowMeleeTimer = 0;
          this.showFloatingText(this.player.x, this.player.y - 60, 'CHOW!', '#ffaa22');
          break;
        case 'finley':
          // v5 Guinness Hero: bright gold glow, slower movement, contact-
          // kills enemies (handled in player-enemy overlap), permanent
          // invincibility for the powerup duration, "INVINCIBLE" text above
          // the head.
          this.player.setTint(0xffe4a8);
          this.playerState.invincibleUntil = this.time.now + this.powerupTimer + 200;
          // Brighter, larger gold halo
          this.finleyGlow = this.add.graphics().setDepth(8);
          this.finleyGlow.fillStyle(0xffdd44, 0.55); this.finleyGlow.fillCircle(0, 0, 60);
          this.finleyGlow.fillStyle(0xffeeaa, 0.30); this.finleyGlow.fillCircle(0, 0, 90);
          this.finleyGlow.fillStyle(0xfff8c0, 0.18); this.finleyGlow.fillCircle(0, 0, 130);
          // Pint of Guinness in hand
          this.finleyPint = this.add.graphics().setDepth(11);
          this.finleyPint.fillStyle(0x3a1a08, 1); this.finleyPint.fillRect(-5, -8, 10, 14);
          this.finleyPint.fillStyle(0xead8ad, 1); this.finleyPint.fillRect(-5, -8, 10, 3);
          this.finleyPint.fillStyle(0x1a0d04, 1); this.finleyPint.fillRect(-5, 5, 10, 1);
          // "INVINCIBLE" text floating above the head
          this.finleyInvText = this.add.text(0, 0, 'INVINCIBLE', {
            fontFamily: 'Impact, "Arial Black", sans-serif', fontSize: '18px',
            color: '#ffdd33', stroke: '#553300', strokeThickness: 3,
            letterSpacing: 2,
          }).setOrigin(0.5).setDepth(12);
          break;
        case 'declan':
          // Frog green
          this.player.setTint(0x33ff44);
          break;
        case 'aaron':
          // Goblin: hunched (60% height), green-grey tint
          this.player.setTint(0x88aa66);
          this.player.setScale(1, 0.6);
          this.showFloatingText(this.player.x, this.player.y - 60, 'MINE!', '#88ff44');
          break;
        case 'charlie':
          // v5 Fatter: 2.5x width, 1.8x height — disable platform collision
          // so Charlie stays grounded and can't reach platforms. Invincible
          // for the whole duration.
          this.player.setTint(0xffccaa);
          this.player.setScale(2.5, 1.8);
          this.playerState.invincibleUntil = this.time.now + this.powerupTimer + 200;
          // Disable the platform collider so Charlie ignores them entirely
          if (this.playerPlatformCollider) {
            this.playerPlatformCollider.active = false;
          }
          break;
      }
    }

    deactivatePowerup() {
      const charId = this.powerupKind;

      this.powerupActive = false;
      this.powerupTimer = 0;
      this.player.clearTint();

      // Reset per-character visuals
      switch (charId) {
        case 'connor':
          this.player.setTexture('player_connor');
          break;
        case 'aaron':
          this.player.setScale(1, 1);
          break;
        case 'charlie':
          this.player.setScale(1, 1);
          // Re-enable platform collisions
          if (this.playerPlatformCollider) {
            this.playerPlatformCollider.active = true;
          }
          break;
        case 'finley':
          if (this.finleyGlow) { this.finleyGlow.destroy(); this.finleyGlow = null; }
          if (this.finleyPint) { this.finleyPint.destroy(); this.finleyPint = null; }
          if (this.finleyInvText) {
            this.finleyInvText.destroy(); this.finleyInvText = null;
          }
          break;
      }

      this.powerupKind = null;
    }

    respawnPowerup() {
      if (this.gameOver) return;
      // Respawn at one of three locations
      const locs = [{ x: 800, y: GROUND_Y - 40 }, { x: 1500, y: GROUND_Y - 40 }, { x: 2400, y: GROUND_Y - 40 }];
      const loc = locs[Math.floor(Math.random() * locs.length)];
      this.powerupOrb.x = loc.x;
      this.powerupOrb.y = loc.y;
      this.powerupOrb.setVisible(true);
      this.powerupOrb.setActive(true);
    }

    // -----------------------------------------------------------------------
    // v6: shoot — bullets travel in a straight line with no gravity and
    // disappear after BULLET_MAX_RANGE pixels. Connor uses a SHOTGUN that
    // fires CONNOR_SHOTGUN_PELLETS bullets in a spread cone (slower fire
    // rate). All other characters fire single pistol shots. Powerups still
    // add on top — Connor's gangster mode adds a second cone offset.
    shoot(pointer) {
      const now = this.time.now;
      const isConnor = this.selectedCharacter === 'connor';
      const cd = isConnor ? CONNOR_SHOTGUN_CD : PLAYER_FIRE_CD;
      if (now - this.lastShotTime < cd) return;
      this.lastShotTime = now;

      // Direction from player to pointer
      const px = this.player.x;
      const py = this.player.y;
      const dx = pointer.worldX - px;
      const dy = pointer.worldY - py;
      const dist = Math.max(20, Math.hypot(dx, dy));
      const nx = dx / dist, ny = dy / dist;
      this.playerState.facing = nx >= 0 ? 1 : -1;
      this.player.setFlipX(nx < 0);

      // Build the list of pellet angles for this shot
      let angles;
      if (isConnor) {
        // Shotgun: 5 evenly-spaced pellets across the spread cone
        angles = [];
        const N = CONNOR_SHOTGUN_PELLETS;
        for (let i = 0; i < N; i++) {
          const t = (N === 1) ? 0 : (i / (N - 1)) - 0.5; // -0.5 .. 0.5
          angles.push(t * CONNOR_SHOTGUN_SPREAD);
        }
      } else {
        angles = [0];
      }

      // Gangster mode adds a second offset salvo (extra barrel)
      const dualPistols = this.powerupActive && this.powerupKind === 'connor';
      const offsets = dualPistols ? [-0.06, 0.06] : [0];

      offsets.forEach(extra => {
        angles.forEach(a => {
          const spread = rotateVec(nx, ny, a + extra);
          const sx = px + nx * 28;
          const sy = py + ny * 6 - 4;
          const b = this.bullets.create(sx, sy, 'bullet');
          b.setVelocity(spread.x * BULLET_SPEED, spread.y * BULLET_SPEED);
          b.body.setSize(10, 10).setOffset(3, 3);
          // v6: track origin for distance falloff/cull
          b.startX = sx;
          b.startY = sy;
          b.maxRange = BULLET_MAX_RANGE;
          // Connor shotgun pellets do less damage individually but cluster
          b.damage = isConnor
            ? Math.floor(this.playerState.damage * 0.45)
            : this.playerState.damage;
          b.isPlayer = true;
          b.isShotgun = isConnor;
        });
      });

      // Big bright muzzle flash at the gun barrel — bigger for shotgun
      const muzzleX = px + nx * 28;
      const muzzleY = py + ny * 6 - 4;
      this.muzzleFX.emitParticleAt(muzzleX, muzzleY, isConnor ? 14 : 8);

      // Recoil camera shake — heavier for shotgun
      this.cameras.main.shake(isConnor ? 110 : 70, isConnor ? 0.005 : 0.003);

      // Recoil kick
      const recoilMul = isConnor ? 1.8 : (dualPistols ? 1.6 : 1);
      this.player.setVelocityX(
        this.player.body.velocity.x + (-nx * 60) * recoilMul
      );
    }

    // v5 Frog mode: bright GREEN horizontal tongue projectile
    shootTongue() {
      const dir = this.playerState.facing || 1;
      const sx = this.player.x + dir * 28;
      const sy = this.player.y + 2;
      const t = this.bullets.create(sx, sy, 'tongue');
      t.setVelocity(dir * 1500, 0);
      t.body.setAllowGravity(false);
      t.body.setSize(28, 8).setOffset(2, 3);
      t.setFlipX(dir < 0);
      t.damage = 9999; // insta-kills standard enemies
      t.isTongue = true;
      t.isPlayer = true;
      // Green burst at the launch point
      this.muzzleFX.emitParticleAt(sx, sy, 6);
      this.cameras.main.shake(40, 0.002);
      this.time.delayedCall(700, () => { if (t.active) t.destroy(); });
    }

    // -----------------------------------------------------------------------
    damageEnemy(enemy, amount, bulletX, bulletY) {
      const data = this.enemyData.get(enemy);
      if (!data || !data.alive) return;

      data.hp -= amount;
      this.bloodFX.emitParticleAt(bulletX, bulletY, 8);
      // White hit flash
      enemy.setTintFill(0xffffff);
      this.time.delayedCall(60, () => {
        if (enemy.active) enemy.clearTint();
      });
      // Small knockback
      const dir = Math.sign(bulletX ? (enemy.x - bulletX) : 1) || 1;
      enemy.setVelocityX(dir * 120);

      if (data.hp <= 0) {
        this.killEnemy(enemy, dir);
      }
    }

    killEnemy(enemy, dir) {
      const data = this.enemyData.get(enemy);
      if (!data) return;
      data.alive = false;
      this.kills += 1;

      // Ragdoll: disable physics body, apply custom motion
      enemy.body.enable = false;
      enemy.setTint(0x884444);
      data.ragdollVx = dir * (220 + Math.random() * 200);
      data.ragdollVy = -300 - Math.random() * 160;
      data.ragdollRot = dir * (2 + Math.random() * 4);

      // Blood burst
      this.bloodFX.emitParticleAt(enemy.x, enemy.y, 18);
      this.cameras.main.shake(140, 0.005);

      // Remove from enemy collisions (already disabled) but keep sprite for ragdoll visual
      this.time.delayedCall(2500, () => {
        this.tweens.add({
          targets: enemy, alpha: 0, duration: 600,
          onComplete: () => {
            // Free the map entry so infinite waves don't leak references
            this.enemyData.delete(enemy);
            if (enemy) enemy.destroy();
          },
        });
      });
    }

    // Floating combat text (CHOW!, MINE!, etc.)
    showFloatingText(x, y, text, color) {
      const t = this.add.text(x, y, text, {
        fontFamily: 'Impact, "Arial Black", sans-serif', fontSize: '34px',
        color: color, stroke: '#000000', strokeThickness: 4,
      }).setOrigin(0.5).setDepth(60);
      this.tweens.add({
        targets: t,
        y: y - 70,
        alpha: { from: 1, to: 0 },
        scale: { from: 1, to: 1.4 },
        duration: 800,
        ease: 'Sine.easeOut',
        onComplete: () => t.destroy(),
      });
    }

    damagePlayer(amount) {
      if (this.gameOver) return;
      this.playerState.hp -= amount;
      this.cameras.main.shake(160, 0.006);
      // Red tint flash — then restore the active powerup tint (or none)
      this.player.setTint(0xff4444);
      this.time.delayedCall(120, () => {
        if (!this.player) return;
        this.player.clearTint();
        if (this.powerupActive) {
          // Re-apply the powerup's tint — v5: no tint for Connor (texture
          // already shows the navy gangster outfit, no yellow wash needed)
          const tint = {
            connor: null, callum: 0xff8866, finley: 0xffe4a8,
            declan: 0x33ff44, aaron: 0x88aa66, charlie: 0xffccaa,
          }[this.powerupKind];
          if (tint != null) this.player.setTint(tint);
        }
      });

      if (this.playerState.hp <= 0) {
        this.playerState.hp = 0;
        this.triggerDeath();
      }
    }

    triggerDeath() {
      this.gameOver = true;
      // Slow-mo start
      this.physics.world.timeScale = 3.0;
      this.tweens.timeScale = 0.35;

      // Red flash overlay
      const red = this.add.rectangle(0, 0, GW, GH, 0xaa0000)
        .setOrigin(0, 0).setScrollFactor(0).setDepth(150).setAlpha(0);
      this.tweens.add({
        targets: red, alpha: 0.6, duration: 500, ease: 'Sine.easeOut',
      });

      // Player fall
      this.player.body.enable = false;
      this.tweens.add({
        targets: this.player,
        y: GROUND_Y - 10,
        rotation: Math.PI / 2,
        duration: 1400, ease: 'Sine.easeOut',
      });

      this.cameras.main.shake(400, 0.01);

      this.time.delayedCall(2000, () => {
        this.scene.start('Death', {
          character: this.selectedCharacter,
          kills: this.kills,
          wave: this.wave,
        });
      });
    }

    // -----------------------------------------------------------------------
    updateHUD() {
      // HP bar
      const hpFrac = Math.max(0, this.playerState.hp / this.playerState.maxHp);
      this.hudHpFill.width = 220 * hpFrac;
      // Color shifts to red when low
      if (hpFrac < 0.25) this.hudHpFill.fillColor = 0xff2200;
      else if (hpFrac < 0.5) this.hudHpFill.fillColor = 0xdd6622;
      else this.hudHpFill.fillColor = 0xcc2222;

      // Bullet time
      const btFrac = this.bulletTimeEnergy / 100;
      this.hudBtFill.width = 180 * btFrac;
      if (this.bulletTimeEnergy < 15) this.hudBtFill.fillColor = 0x555555;
      else this.hudBtFill.fillColor = 0x33ccff;

      // Kills (no /total — waves are infinite)
      this.hudKills.setText('KILLS: ' + this.kills);

      // Wave indicator
      this.hudWave.setText('WAVE ' + this.wave);

      // Powerup indicator — name is character-specific
      const powName = CHARACTERS[this.selectedCharacter].powerup;
      if (this.powerupActive) {
        this.hudPowerupLabel.setText('POWERUP: ' + powName + ' ACTIVE');
        this.hudPowerupLabel.setColor('#ffaa22');
        this.hudPowerupBarBg.setVisible(true);
        this.hudPowerupBarFill.setVisible(true);
        this.hudPowerupBarFill.width = 180 * (this.powerupTimer / this.powerupMax);
      } else if (this.powerupHeld) {
        this.hudPowerupLabel.setText('POWERUP: ' + powName + ' (PRESS E)');
        this.hudPowerupLabel.setColor('#ffdd88');
        this.hudPowerupBarBg.setVisible(false);
        this.hudPowerupBarFill.setVisible(false);
      } else {
        this.hudPowerupLabel.setText('POWERUP: NONE');
        this.hudPowerupLabel.setColor('#666666');
        this.hudPowerupBarBg.setVisible(false);
        this.hudPowerupBarFill.setVisible(false);
      }
    }

    // -----------------------------------------------------------------------
    // Infinite waves — v5: when all enemies dead, show a dramatic
    // "WAVE CLEAR" text + screen flash, then 3s pause, then spawn next wave.
    checkWaveProgress() {
      if (this.gameOver || this.waveTransitioning) return;
      let alive = 0;
      for (const data of this.enemyData.values()) {
        if (data.alive) { alive += 1; break; }
      }
      if (alive === 0) {
        this.waveTransitioning = true;
        this.showWaveClear();
        this.cameras.main.flash(220, 255, 230, 120);
        this.time.delayedCall(3000, () => {
          if (this.gameOver) return;
          this.wave += 1;
          this.spawnWave(this.wave);
          this.showWaveBanner(this.wave);
          this.waveTransitioning = false;
        });
      }
    }

    // v5: dramatic "WAVE CLEAR" text that pulses on screen briefly
    showWaveClear() {
      const t = this.add.text(GW / 2, GH / 2 - 20, 'WAVE CLEAR', {
        fontFamily: 'Impact, "Arial Black", sans-serif', fontSize: '110px',
        color: '#ffee44', stroke: '#553a00', strokeThickness: 8,
      }).setOrigin(0.5).setScrollFactor(0).setDepth(180).setAlpha(0).setScale(0.5);
      this.tweens.add({
        targets: t,
        alpha: { from: 0, to: 1 }, scale: { from: 0.5, to: 1.1 },
        duration: 360, ease: 'Back.easeOut',
      });
      this.cameras.main.shake(180, 0.005);
      this.time.delayedCall(1500, () => {
        this.tweens.add({
          targets: t, alpha: 0, duration: 350,
          onComplete: () => t.destroy(),
        });
      });
    }

    // v6: showWaveBanner — "WAVE n" big text + the location title under it
    // (e.g. "NORTHERN QUARTER", "PICCADILLY GARDENS", etc.). Locations only
    // change on the milestone waves — others keep showing the previous one.
    showWaveBanner(n) {
      // Find the most recent milestone <= n
      let locWave = 1;
      Object.keys(WAVE_LOCATIONS).forEach(k => {
        const kn = parseInt(k, 10);
        if (kn <= n && kn > locWave) locWave = kn;
      });
      const locText = WAVE_LOCATIONS[locWave];

      const banner = this.add.text(GW / 2, GH / 2 - 30, 'WAVE ' + n, {
        fontFamily: 'Impact, "Arial Black", sans-serif', fontSize: '120px',
        color: '#ff3333', stroke: '#330000', strokeThickness: 8,
      }).setOrigin(0.5).setScrollFactor(0).setDepth(180).setAlpha(0).setScale(0.5);

      const loc = this.add.text(GW / 2, GH / 2 + 50, locText, {
        fontFamily: 'Impact, "Arial Black", sans-serif', fontSize: '32px',
        color: '#ffaa44', stroke: '#221100', strokeThickness: 4,
        letterSpacing: 4,
      }).setOrigin(0.5).setScrollFactor(0).setDepth(180).setAlpha(0);

      const sub = this.add.text(GW / 2, GH / 2 + 90, 'INCOMING', {
        fontFamily: 'monospace', fontSize: '16px', color: '#ff8866',
        letterSpacing: 6,
      }).setOrigin(0.5).setScrollFactor(0).setDepth(180).setAlpha(0);

      this.tweens.add({
        targets: banner,
        alpha: { from: 0, to: 1 }, scale: { from: 0.5, to: 1.1 },
        duration: 400, ease: 'Back.easeOut',
      });
      this.tweens.add({
        targets: loc, alpha: { from: 0, to: 1 }, duration: 400, delay: 150,
      });
      this.tweens.add({
        targets: sub, alpha: { from: 0, to: 1 }, duration: 400, delay: 300,
      });
      this.cameras.main.shake(160, 0.004);
      this.time.delayedCall(1800, () => {
        this.tweens.add({
          targets: [banner, loc, sub], alpha: 0, duration: 400,
          onComplete: () => { banner.destroy(); loc.destroy(); sub.destroy(); },
        });
      });
    }
  }

  // =============================================================================
  // SCENE: DEATH
  // =============================================================================
  class DeathScene extends Phaser.Scene {
    constructor() { super({ key: 'Death' }); }

    init(data) {
      this.payload = data || { kills: 0, wave: 1, character: 'connor' };
    }

    create() {
      this.cameras.main.setBackgroundColor('#1a0505');

      const red = this.add.rectangle(0, 0, GW, GH, 0x880000)
        .setOrigin(0, 0).setAlpha(0.15);

      // "YOU DIED" layered glow
      const t = 'YOU DIED';
      [
        { thick: 22, a: 0.15 }, { thick: 14, a: 0.3 }, { thick: 6, a: 0.7 },
      ].forEach(l => {
        this.add.text(GW / 2, GH / 2 - 40, t, {
          fontFamily: 'Impact', fontSize: '110px',
          color: '#aa0000', stroke: '#aa0000', strokeThickness: l.thick,
        }).setOrigin(0.5).setAlpha(l.a);
      });
      const main = this.add.text(GW / 2, GH / 2 - 40, t, {
        fontFamily: 'Impact', fontSize: '110px',
        color: '#ff3333', stroke: '#330000', strokeThickness: 3,
      }).setOrigin(0.5);

      // Kill count + wave reached
      this.add.text(GW / 2, GH / 2 + 40,
        'KILLS: ' + this.payload.kills, {
          fontFamily: 'Impact', fontSize: '34px',
          color: '#ffaa22', stroke: '#441100', strokeThickness: 2,
        }).setOrigin(0.5);

      this.add.text(GW / 2, GH / 2 + 76,
        'WAVE ' + this.payload.wave + ' REACHED', {
          fontFamily: 'Impact', fontSize: '24px',
          color: '#33ccff', stroke: '#001a33', strokeThickness: 2,
        }).setOrigin(0.5);

      // Character
      this.add.text(GW / 2, GH / 2 + 110,
        'AS ' + CHARACTERS[this.payload.character].name, {
          fontFamily: 'monospace', fontSize: '14px', color: '#777',
          letterSpacing: 3,
        }).setOrigin(0.5);

      // Retry prompt
      const retry = this.add.text(GW / 2, GH - 90, 'CLICK TO RETRY', {
        fontFamily: 'Impact', fontSize: '28px', color: '#ffffff',
        stroke: '#550000', strokeThickness: 2, letterSpacing: 3,
      }).setOrigin(0.5);
      this.tweens.add({
        targets: retry, alpha: { from: 0.4, to: 1 },
        duration: 700, yoyo: true, repeat: -1,
      });

      this.add.text(GW / 2, GH - 50, 'ESC TO PICK ANOTHER CHARACTER', {
        fontFamily: 'monospace', fontSize: '12px', color: '#554040',
        letterSpacing: 2,
      }).setOrigin(0.5);

      // Zoom-in on title
      main.setScale(0.6);
      this.tweens.add({ targets: main, scale: 1, duration: 700, ease: 'Back.easeOut' });

      this.input.on('pointerdown', () => {
        this.scene.start('Game', { character: this.payload.character });
      });
      this.input.keyboard.on('keydown-ESC', () => {
        this.scene.start('CharacterSelect');
      });
    }
  }

        .setOrigin(0, 0).setAlpha(0.12);

      const t = 'CARNAGE COMPLETE';
      [
        { thick: 22, a: 0.15 }, { thick: 14, a: 0.3 }, { thick: 6, a: 0.7 },

          color: '#00cc66', stroke: '#00cc66', strokeThickness: l.thick,
        }).setOrigin(0.5).setAlpha(l.a);

      this.input.keyboard.on('keydown-ESC', () => {
        this.scene.start('CharacterSelect');
      });
    }
  }

  // =============================================================================
  // HELPERS
  // =============================================================================

  // Small seeded PRNG so backdrop generation is deterministic
  function mulberry32(seed) {
    let t = seed >>> 0;
    return function () {
      t = (t + 0x6D2B79F5) | 0;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }

  function rotateVec(x, y, radians) {
    const c = Math.cos(radians), s = Math.sin(radians);
    return { x: x * c - y * s, y: x * s + y * c };
  }

  // =============================================================================
  // PHASER CONFIG
  // =============================================================================
  const config = {
    type: Phaser.AUTO,
    parent: 'game',
    width: GW,
    height: GH,
    backgroundColor: '#000000',
    physics: {
      default: 'arcade',
      arcade: { gravity: { y: GRAVITY }, debug: false },
    },
    render: { pixelArt: false, antialias: true },
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
    },
    scene: [BootScene, StoryIntroScene, CharacterSelectScene, GameScene, DeathScene, WinScene],
  };

  new Phaser.Game(config);
  </script>
