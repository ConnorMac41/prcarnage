<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRCARNAGE</title>
<style>
  /* ===== Root reset ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #ccc;
    width: 100%;
    height: 100%;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game { position: relative; }
  canvas { display: block; image-rendering: auto; }

  /* ===== Film grain overlay (CSS) ===== */
  /* A looping SVG noise pattern, lightly blended over the canvas. Adds texture. */
  #film-grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.08;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.3' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
    animation: grain 0.4s steps(5) infinite;
  }
  @keyframes grain {
    0%   { transform: translate(0, 0); }
    20%  { transform: translate(-2%, 1%); }
    40%  { transform: translate(1%, -2%); }
    60%  { transform: translate(-1%, 2%); }
    80%  { transform: translate(2%, -1%); }
    100% { transform: translate(0, 0); }
  }

  /* Subtle scanline streak for that neon-noir feel */
  #scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 49;
    opacity: 0.06;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(255,255,255,0.4) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>
  <div id="game"></div>
  <div id="film-grain"></div>
  <div id="scanlines"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script>
  /* ==========================================================================
     PRCARNAGE — gritty 2D side-scroller on Manchester streets
     Single-file Phaser 3 game.

     Scenes: CharacterSelect → Game → Death / Win
     All art generated from Phaser Graphics primitives.
     ========================================================================== */

  // =============================================================================
  // CONSTANTS
  // =============================================================================
  const GW = 1280;           // game viewport width
  const GH = 720;            // game viewport height
  const WORLD_W = 3000;      // full level width
  const GROUND_Y = 620;      // where the street surface sits
  const GRAVITY = 1600;      // base gravity (px/s^2)

  const COYOTE_MS = 150;     // v6: coyote-time grace 0.15s after walking off
  const JUMP_BUFFER_MS = 100;// jump pressed slightly before landing
  const JUMP_VEL = -580;     // upward velocity on jump
  const SLIDE_VEL = 440;     // slide launch velocity
  const SLIDE_MS = 500;      // slide duration
  const BULLET_SPEED = 1100; // v6: faster — bullets fly straight, no gravity
  const BULLET_MAX_RANGE = 800; // v6: bullets disappear after 800px traveled
  const PLAYER_FIRE_CD = 180;// pistol cooldown (default for non-Connor)
  const CONNOR_SHOTGUN_CD = 600; // v6: Connor's shotgun cooldown
  const CONNOR_SHOTGUN_PELLETS = 5; // v6: pellets per shotgun blast
  const CONNOR_SHOTGUN_SPREAD = 0.55; // v6: total spread cone (radians)
  const BULLET_TIME_FACTOR = 0.25; // world timescale during bullet time
  const BULLET_TIME_DRAIN = 55;    // energy drained per second while active
  const BULLET_TIME_REGEN = 22;    // energy regen per second when not active

  // v6: Wave location titles — shown at the start of certain waves
  const WAVE_LOCATIONS = {
    1:  'NORTHERN QUARTER',
    3:  'ARNDALE BACK ALLEYS',
    5:  'PICCADILLY GARDENS',
    7:  'CURRY MILE',
    10: 'THE PRINTWORKS — FINAL STAND',
  };

  // v6: Difficulty scaling per wave
  // - Enemy count: wave 1 = 6, wave 2 = 8, wave 3 = 10, then +2 per wave
  // - Speed: +8% per wave, capped at 2x
  // - Composition shifts: wave 3+ more bouncers; wave 5+ hoodies majority
  // - Wave 4+: enemies occasionally throw grenades
  function waveEnemyCount(n) {
    if (n <= 1) return 6;
    return 6 + (n - 1) * 2; // wave 2 = 8, wave 3 = 10, wave 4 = 12...
  }
  function waveSpeedMul(n) {
    return Math.min(2.0, 1 + (n - 1) * 0.08);
  }
  function waveComposition(n) {
    // Returns weighted type pool — one entry per spawn slot
    if (n >= 5) return ['hoodie','hoodie','hoodie','hoodie','bouncer','bouncer','chav'];
    if (n >= 3) return ['chav','chav','bouncer','bouncer','bouncer','hoodie','hoodie'];
    return ['chav','chav','chav','hoodie','hoodie','bouncer'];
  }
  function waveCanGrenade(n) { return n >= 4; }

  // =============================================================================
  // CHARACTERS — full roster. All 6 unlocked in v3.
  // =============================================================================
  const CHARACTERS = {
    connor: {
      id: 'connor', name: 'CONNOR', unlocked: true,
      stats: { speed: 8, hp: 7, damage: 7 },
      powerup: 'GANGSTER MODE',
      powerupDesc: 'Dual pistols, +50% speed (8s)',
    },
    callum: {
      id: 'callum', name: 'CALLUM', unlocked: true,
      stats: { speed: 6, hp: 6, damage: 6 },
      powerup: 'LESLIE CHOW MODE',
      powerupDesc: 'Auto-melee, 2x speed (6s)',
    },
    finley: {
      id: 'finley', name: 'FINLEY', unlocked: true,
      stats: { speed: 10, hp: 4, damage: 6 },
      powerup: 'GUINNESS HERO',
      powerupDesc: 'Invincible, golden glow (6s)',
    },
    declan: {
      id: 'declan', name: 'DECLAN', unlocked: true,
      stats: { speed: 7, hp: 4, damage: 8 },
      powerup: 'FROG MODE',
      powerupDesc: 'Triple jump, F=tongue (6s)',
    },
    aaron: {
      id: 'aaron', name: 'AARON', unlocked: true,
      stats: { speed: 4, hp: 10, damage: 6 },
      powerup: 'GOBLIN MODE',
      powerupDesc: 'Crawl, contact kill (8s)',
    },
    charlie: {
      id: 'charlie', name: 'CHARLIE', unlocked: true,
      stats: { speed: 3, hp: 10, damage: 9 },
      powerup: 'GETS FATTER',
      powerupDesc: '2x size, knockback kill (6s)',
    },
  };
  const CHAR_ORDER = ['connor', 'callum', 'finley', 'declan', 'aaron', 'charlie'];

  // Powerup duration in milliseconds, per character
  const POWERUP_DURATION = {
    connor: 12000, callum: 8000, finley: 10000,
    declan: 10000, aaron: 12000, charlie: 10000,
  };

  // Derived player tuning from the 1-10 stat values
  const statToSpeed  = s => 180 + s * 22;   // 200 -> 400 px/s
  const statToHP     = s => 40 + s * 14;    // 54 -> 180 hp
  const statToDamage = s => 18 + s * 7;     // 25 -> 88

  // =============================================================================
  // WORLD CONTENT — neon signs, platforms, enemy spawn points
  // =============================================================================
  const NEON_SIGNS = [
    { x: 300,  y: 180, text: 'AFFLECKS',    color: 0xff2288 },
    { x: 720,  y: 230, text: 'PRINTWORKS',  color: 0x33ffbb },
    { x: 1120, y: 160, text: 'ARNDALE',     color: 0xffaa22 },
    { x: 1520, y: 210, text: 'CURRY MILE',  color: 0xff4422 },
    { x: 1900, y: 175, text: 'PICCADILLY',  color: 0x33aaff },
    { x: 2300, y: 230, text: "SPOONS",      color: 0xffff33 },
    { x: 2700, y: 190, text: 'KEBAB',       color: 0xff33dd },
  ];

  // v6: Many more platforms at varying heights — proper Mario/Broforce style
  // platforming. Three rough bands: low (~510), mid (~410), high (~310/270).
  // Higher platforms are tactical-position spots reachable only via double-
  // jump or by stepping up through lower platforms. Marked `kind` is
  // cosmetic — 'platform' = concrete slab, 'rooftop' = wider rooftop,
  // 'fireescape' = narrow grated platform, 'bin' = rubbish bin you can stand on.
  const PLATFORM_DATA = [
    // Low band (ground+~110) — easy hop ups, often above bins
    { x: 220,  y: 540, w: 50,  kind: 'bin' },
    { x: 400,  y: 510, w: 140, kind: 'platform' },
    { x: 600,  y: 540, w: 50,  kind: 'bin' },
    { x: 1000, y: 510, w: 180, kind: 'platform' },
    { x: 1240, y: 540, w: 50,  kind: 'bin' },
    { x: 1480, y: 540, w: 50,  kind: 'bin' },
    { x: 1950, y: 510, w: 140, kind: 'platform' },
    { x: 2250, y: 540, w: 50,  kind: 'bin' },
    { x: 2600, y: 510, w: 200, kind: 'platform' },
    { x: 2880, y: 540, w: 50,  kind: 'bin' },

    // Mid band (~400) — fire escapes and standard platforms
    { x: 700,  y: 410, w: 120, kind: 'fireescape' },
    { x: 1300, y: 410, w: 140, kind: 'platform' },
    { x: 1620, y: 380, w: 160, kind: 'fireescape' },
    { x: 2250, y: 400, w: 170, kind: 'platform' },
    { x: 2780, y: 400, w: 120, kind: 'fireescape' },

    // High band (~280) — wide rooftops, tactical positions
    { x: 500,  y: 290, w: 180, kind: 'rooftop' },
    { x: 1100, y: 280, w: 220, kind: 'rooftop' },
    { x: 1820, y: 270, w: 240, kind: 'rooftop' },
    { x: 2450, y: 290, w: 200, kind: 'rooftop' },
  ];

  // 6 enemies — mixture of types spread across the level
  const ENEMY_SPAWNS = [
    { x: 550,  type: 'chav' },
    { x: 950,  type: 'hoodie' },
    { x: 1380, type: 'bouncer' },
    { x: 1830, type: 'chav' },
    { x: 2200, type: 'hoodie' },
    { x: 2780, type: 'bouncer' },
  ];

  // =============================================================================
  // CHARACTER DRAW FUNCTIONS
  // Each draws a ~50x72 sprite centered at (cx, cy).
  // Used by the character-select cards AND for generating in-game player texture.
  // =============================================================================

  // v5: Connor — single curly wavy hair blob (no double hair), gangster
  // outfit is dark navy with gold chain + sunglasses (no yellow tint anywhere)
  function drawConnor(g, cx, cy, opt = {}) {
    // Legs — baggy navy jeans, smoother taper
    g.fillStyle(0x1b2438);
    g.fillEllipse(cx - 7, cy + 18, 12, 30);
    g.fillEllipse(cx + 7, cy + 18, 12, 30);
    // White trainers with red flash
    g.fillStyle(0xf2f2f2);
    g.fillEllipse(cx - 7, cy + 33, 14, 7);
    g.fillEllipse(cx + 7, cy + 33, 14, 7);
    g.fillStyle(0xc62828);
    g.fillRect(cx - 13, cy + 33, 12, 2);
    g.fillRect(cx + 1,  cy + 33, 12, 2);
    // Torso — gangster: dark navy jacket; normal: dark grey
    g.fillStyle(opt.gangster ? 0x0a1230 : 0x262626);
    g.fillEllipse(cx, cy - 2, 32, 30);
    // Jacket lapel V — slightly darker than torso
    g.fillStyle(opt.gangster ? 0x05081a : 0x141414);
    g.fillTriangle(cx - 8, cy - 14, cx + 8, cy - 14, cx, cy + 4);
    // Gold chain — only in gangster mode (gold accent, not yellow body)
    if (opt.gangster) {
      g.fillStyle(0xffd700);
      g.fillCircle(cx - 5, cy - 8, 1.5);
      g.fillCircle(cx - 2, cy - 6, 1.5);
      g.fillCircle(cx + 2, cy - 6, 1.5);
      g.fillCircle(cx + 5, cy - 8, 1.5);
      g.fillCircle(cx, cy - 4, 3);
    }
    // Left arm (right arm is drawn separately as the rotating gun arm overlay)
    g.fillStyle(opt.gangster ? 0x0a1230 : 0x262626);
    g.fillEllipse(cx - 16, cy - 2, 8, 22);
    // Left hand
    g.fillStyle(0xf0c49a);
    g.fillCircle(cx - 16, cy + 10, 3);
    // Right arm — small stub only (the rotating arm graphic covers this)
    g.fillStyle(opt.gangster ? 0x0a1230 : 0x262626);
    g.fillEllipse(cx + 14, cy - 4, 8, 14);
    // Neck
    g.fillStyle(0xf0c49a);
    g.fillRect(cx - 3, cy - 16, 6, 5);
    // Head — rounded, slightly larger for visible features
    g.fillStyle(0xf0c49a);
    g.fillCircle(cx, cy - 22, 10);
    // v5: ONE curly wavy hair blob — irregular asymmetric shape, brown/blonde
    g.fillStyle(0x6b4a28);
    // Main mass on top of head
    g.fillEllipse(cx, cy - 30, 24, 11);
    // One curly tuft offset right (gives the wavy/messy curl)
    g.fillEllipse(cx + 5, cy - 33, 10, 7);
    // One small curl front
    g.fillEllipse(cx - 8, cy - 28, 6, 5);
    // Eyes / sunglasses (gangster wears shades — no yellow anywhere)
    if (opt.gangster) {
      // Black aviator-style shades across the eyes
      g.fillStyle(0x000000);
      g.fillRect(cx - 9, cy - 23, 18, 5);
      // Bridge highlight
      g.fillStyle(0x444444);
      g.fillRect(cx - 1, cy - 22, 2, 1);
      // Lens reflections (white pinpoint, not yellow)
      g.fillStyle(0xffffff);
      g.fillRect(cx - 6, cy - 22, 2, 1);
      g.fillRect(cx + 4, cy - 22, 2, 1);
    } else {
      g.fillStyle(0xffffff);
      g.fillCircle(cx - 4, cy - 22, 1.6);
      g.fillCircle(cx + 4, cy - 22, 1.6);
      g.fillStyle(0x000000);
      g.fillCircle(cx - 4, cy - 22, 0.9);
      g.fillCircle(cx + 4, cy - 22, 0.9);
    }
    // Mouth
    g.fillStyle(0x6a3320);
    g.fillRect(cx - 3, cy - 17, 6, 1);
  }

  function drawCallum(g, cx, cy) {
    // Joggers
    g.fillStyle(0x2a2a2a);
    g.fillEllipse(cx - 6, cy + 18, 11, 28);
    g.fillEllipse(cx + 6, cy + 18, 11, 28);
    // Red/white gazelles
    g.fillStyle(0xcc2222);
    g.fillEllipse(cx - 6, cy + 32, 13, 6);
    g.fillEllipse(cx + 6, cy + 32, 13, 6);
    g.fillStyle(0xffffff);
    g.fillRect(cx - 12, cy + 33, 12, 2);
    g.fillRect(cx,      cy + 33, 12, 2);
    // North Face quarter-zip
    g.fillStyle(0x141414);
    g.fillEllipse(cx, cy - 2, 28, 28);
    // Arms
    g.fillEllipse(cx - 14, cy - 2, 8, 22);
    g.fillEllipse(cx + 14, cy - 2, 8, 22);
    // Hands
    g.fillStyle(0xe8c49a);
    g.fillCircle(cx - 14, cy + 10, 3);
    g.fillCircle(cx + 14, cy + 10, 3);
    // Logo
    g.fillStyle(0xffffff);
    g.fillRect(cx - 3, cy - 8, 6, 1);
    g.fillStyle(0x3a3a3a);
    g.fillRect(cx, cy - 14, 1, 14);
    // Neck
    g.fillStyle(0xe8c49a);
    g.fillRect(cx - 3, cy - 16, 6, 5);
    // Head
    g.fillStyle(0xe8c49a);
    g.fillCircle(cx, cy - 22, 9);
    // Bowl cut
    g.fillStyle(0x0a0a0a);
    g.fillEllipse(cx, cy - 28, 20, 8);
    // Eyes
    g.fillStyle(0xffffff);
    g.fillCircle(cx - 4, cy - 22, 1.6);
    g.fillCircle(cx + 4, cy - 22, 1.6);
    g.fillStyle(0x000000);
    g.fillCircle(cx - 4, cy - 22, 0.9);
    g.fillCircle(cx + 4, cy - 22, 0.9);
    // Mouth
    g.fillStyle(0x6a3320);
    g.fillRect(cx - 3, cy - 17, 6, 1);
  }

  function drawFinley(g, cx, cy) {
    // Lycra
    g.fillStyle(0x1a5acc);
    g.fillEllipse(cx - 6, cy + 18, 10, 28);
    g.fillEllipse(cx + 6, cy + 18, 10, 28);
    // Cycling shoes
    g.fillStyle(0x101010);
    g.fillEllipse(cx - 6, cy + 32, 11, 5);
    g.fillEllipse(cx + 6, cy + 32, 11, 5);
    // GoreTex jacket
    g.fillStyle(0x3a6a2a);
    g.fillEllipse(cx, cy - 2, 28, 28);
    // Arms
    g.fillEllipse(cx - 14, cy - 2, 8, 22);
    g.fillEllipse(cx + 14, cy - 2, 8, 22);
    // Hands
    g.fillStyle(0xf5d1ad);
    g.fillCircle(cx - 14, cy + 10, 3);
    g.fillCircle(cx + 14, cy + 10, 3);
    // Reflective strip
    g.fillStyle(0xf0f0f0);
    g.fillRect(cx - 13, cy - 7, 26, 2);
    // Neck
    g.fillStyle(0xf5d1ad);
    g.fillRect(cx - 3, cy - 16, 6, 5);
    // Head
    g.fillStyle(0xf5d1ad);
    g.fillCircle(cx, cy - 22, 9);
    // Freckles
    g.fillStyle(0xaa7744);
    g.fillRect(cx - 4, cy - 20, 1, 1);
    g.fillRect(cx - 1, cy - 19, 1, 1);
    g.fillRect(cx + 3, cy - 20, 1, 1);
    g.fillRect(cx + 5, cy - 19, 1, 1);
    // French crop
    g.fillStyle(0x4a3a2a);
    g.fillEllipse(cx, cy - 28, 18, 7);
    // Eyes
    g.fillStyle(0xffffff);
    g.fillCircle(cx - 4, cy - 22, 1.6);
    g.fillCircle(cx + 4, cy - 22, 1.6);
    g.fillStyle(0x000000);
    g.fillCircle(cx - 4, cy - 22, 0.9);
    g.fillCircle(cx + 4, cy - 22, 0.9);
    // Mouth
    g.fillStyle(0x6a3320);
    g.fillRect(cx - 3, cy - 17, 6, 1);
  }

  function drawDeclan(g, cx, cy, opt = {}) {
    const skin = opt.frog ? 0x33aa33 : 0xffdd1a;
    const stance = opt.frog ? 11 : 5;
    // Legs — frog mode = wider squat, narrow otherwise
    g.fillStyle(opt.frog ? 0x2a8a2a : 0x0a0a0a);
    g.fillEllipse(cx - stance, cy + 18, opt.frog ? 14 : 9, 28);
    g.fillEllipse(cx + stance, cy + 18, opt.frog ? 14 : 9, 28);
    // Shoes / frog feet
    g.fillStyle(opt.frog ? 0x33aa33 : 0xcc2222);
    g.fillEllipse(cx - stance, cy + 32, opt.frog ? 16 : 10, 6);
    g.fillEllipse(cx + stance, cy + 32, opt.frog ? 16 : 10, 6);
    // Nike sweater (grey)
    g.fillStyle(opt.frog ? 0x2a8a2a : 0x555555);
    g.fillEllipse(cx, cy - 2, 24, 28);
    // Arms
    g.fillEllipse(cx - 13, cy - 2, 7, 20);
    g.fillEllipse(cx + 13, cy - 2, 7, 20);
    // Hands
    g.fillStyle(skin);
    g.fillCircle(cx - 13, cy + 9, 3);
    g.fillCircle(cx + 13, cy + 9, 3);
    // Swoosh
    if (!opt.frog) {
      g.fillStyle(0xffffff);
      g.fillRect(cx - 3, cy - 8, 8, 1);
    }
    // Neck
    g.fillStyle(skin);
    g.fillRect(cx - 3, cy - 16, 6, 5);
    // Head
    g.fillStyle(skin);
    g.fillCircle(cx, cy - 22, 9);
    if (opt.frog) {
      // Bulging eyes on sides of head
      g.fillStyle(0xffffff);
      g.fillCircle(cx - 9, cy - 28, 5);
      g.fillCircle(cx + 9, cy - 28, 5);
      g.fillStyle(0x000000);
      g.fillCircle(cx - 9, cy - 28, 2.5);
      g.fillCircle(cx + 9, cy - 28, 2.5);
      // Wide mouth
      g.fillStyle(0x114411);
      g.fillRect(cx - 6, cy - 18, 12, 2);
    } else {
      // Short dark hair
      g.fillStyle(0x3a2a1a);
      g.fillEllipse(cx, cy - 28, 18, 6);
      // Eyes
      g.fillStyle(0xffffff);
      g.fillCircle(cx - 4, cy - 22, 1.6);
      g.fillCircle(cx + 4, cy - 22, 1.6);
      g.fillStyle(0x000000);
      g.fillCircle(cx - 4, cy - 22, 0.9);
      g.fillCircle(cx + 4, cy - 22, 0.9);
      // Mouth
      g.fillStyle(0x6a3320);
      g.fillRect(cx - 3, cy - 17, 6, 1);
    }
  }

  function drawAaron(g, cx, cy, opt = {}) {
    if (opt.goblin) {
      // Goblin morph — hunched 45deg, claws, beak, red eyes
      // Translate / shift body forward
      const skin = 0x6a8a5a;
      // Squat legs (bent)
      g.fillStyle(0x3a3a2a);
      g.fillEllipse(cx - 8, cy + 22, 11, 18);
      g.fillEllipse(cx + 8, cy + 22, 11, 18);
      // Clawed feet
      g.fillStyle(0x2a1a0a);
      g.fillEllipse(cx - 8, cy + 32, 14, 6);
      g.fillEllipse(cx + 8, cy + 32, 14, 6);
      // Hunched torso — angled forward
      g.fillStyle(0x556644);
      g.fillEllipse(cx + 4, cy + 4, 30, 22);
      // Long elongated arms dragging near ground
      g.fillStyle(skin);
      g.fillEllipse(cx + 14, cy + 14, 8, 26);
      g.fillEllipse(cx - 8, cy + 14, 8, 26);
      // Claws at ends
      g.fillStyle(0x2a1a0a);
      g.fillTriangle(cx + 14, cy + 26, cx + 10, cy + 30, cx + 18, cy + 30);
      g.fillTriangle(cx - 8, cy + 26, cx - 12, cy + 30, cx - 4, cy + 30);
      // Forward-jutting head
      g.fillStyle(skin);
      g.fillCircle(cx + 8, cy - 8, 10);
      // Pointy beak nose
      g.fillStyle(0x4a5a3a);
      g.fillTriangle(cx + 16, cy - 8, cx + 24, cy - 6, cx + 16, cy - 4);
      // Glowing red eyes
      g.fillStyle(0xff2222);
      g.fillCircle(cx + 5, cy - 10, 2);
      g.fillCircle(cx + 11, cy - 10, 2);
      // Pointy ears
      g.fillStyle(skin);
      g.fillTriangle(cx + 2, cy - 14, cx - 2, cy - 22, cx + 6, cy - 16);
      // Jagged teeth
      g.fillStyle(0xeeddaa);
      g.fillTriangle(cx + 8, cy - 4, cx + 10, cy - 1, cx + 12, cy - 4);
      return;
    }
    // Normal finance bro
    g.fillStyle(0xc9a97a);
    g.fillEllipse(cx - 6, cy + 18, 12, 28);
    g.fillEllipse(cx + 6, cy + 18, 12, 28);
    // Brown loafers
    g.fillStyle(0x5a3a1a);
    g.fillEllipse(cx - 6, cy + 32, 13, 6);
    g.fillEllipse(cx + 6, cy + 32, 13, 6);
    // Light-blue shirt
    g.fillStyle(0xaaccee);
    g.fillEllipse(cx, cy - 2, 28, 28);
    // Arms
    g.fillEllipse(cx - 14, cy - 2, 8, 22);
    g.fillEllipse(cx + 14, cy - 2, 8, 22);
    // Hands
    g.fillStyle(0xe8c090);
    g.fillCircle(cx - 14, cy + 10, 3);
    g.fillCircle(cx + 14, cy + 10, 3);

  function makeCharTexture(scene, key, drawFn, opt = {}) {

  // =============================================================================
  // SCENE: STORY INTRO — v6
  // Four lines of text fade in one at a time. Click anywhere to skip
  // straight to the character select screen.
  // =============================================================================
  class StoryIntroScene extends Phaser.Scene {
    constructor() { super({ key: 'StoryIntro' }); }

    create() {
      this.cameras.main.setBackgroundColor('#000000');

      // Faint city silhouette + rain to set the mood
      const city = this.add.graphics();
      city.fillStyle(0x080510, 1);
      city.fillRect(0, 0, GW, GH);
      // Distant red glow pool at the horizon
      city.fillStyle(0x331008, 1);
      city.fillEllipse(GW / 2, GH * 0.78, GW * 1.2, 200);
      city.fillStyle(0x551a14, 0.5);
      city.fillEllipse(GW / 2, GH * 0.78, GW * 0.6, 100);
      // Building silhouettes
      const rng = mulberry32(7);
      let x = 0;
      while (x < GW) {
        const bw = 50 + rng() * 100;
        const bh = 110 + rng() * 220;
        city.fillStyle(0x040208, 1);
        city.fillRect(x, GH - bh - 80, bw, bh);
        x += bw + 4 + rng() * 14;
      }

      // Rain
      this.bgRain = [];
      for (let i = 0; i < 140; i++) {
        this.bgRain.push({
          x: Math.random() * GW, y: Math.random() * GH,
          v: 380 + Math.random() * 280,
        });
      }
      this.rainGfx = this.add.graphics().setDepth(5);

      // Title card "MANCHESTER, 2 AM" — big, set apart
      const titleCard = this.add.text(GW / 2, GH * 0.32, 'MANCHESTER, 2 AM', {
        fontFamily: 'Impact, "Arial Black", sans-serif', fontSize: '74px',
        color: '#ff3322', stroke: '#330000', strokeThickness: 6,
        letterSpacing: 6,
      }).setOrigin(0.5).setAlpha(0);

      // Three story lines beneath
      const line1 = this.add.text(GW / 2, GH * 0.50,
        'The streets of Piccadilly have gone mental.\nChavs, bouncers and hoodies have taken over the Northern Quarter.', {
        fontFamily: 'monospace', fontSize: '20px', color: '#cccccc',
        align: 'center', lineSpacing: 6,
      }).setOrigin(0.5).setAlpha(0);

      const line2 = this.add.text(GW / 2, GH * 0.66,
        'You and the lads are the only ones who can sort it out.', {
        fontFamily: 'monospace', fontSize: '20px', color: '#cccccc',
        align: 'center',
      }).setOrigin(0.5).setAlpha(0);

      const line3 = this.add.text(GW / 2, GH * 0.78, 'Pick your fighter.', {
        fontFamily: 'Impact', fontSize: '38px', color: '#ffaa22',
        stroke: '#221100', strokeThickness: 3, letterSpacing: 4,
      }).setOrigin(0.5).setAlpha(0);

      // Skip prompt at the very bottom
      const skipPrompt = this.add.text(GW / 2, GH - 30, 'CLICK TO SKIP / CONTINUE', {
        fontFamily: 'monospace', fontSize: '12px', color: '#665050',
        letterSpacing: 4,
      }).setOrigin(0.5).setAlpha(0);

      // Sequenced fade-ins
      this.tweens.add({ targets: titleCard,  alpha: 1, duration: 700, delay: 250 });
      this.tweens.add({ targets: line1,      alpha: 1, duration: 700, delay: 1700 });
      this.tweens.add({ targets: line2,      alpha: 1, duration: 700, delay: 3400 });
      this.tweens.add({ targets: line3,      alpha: 1, duration: 700, delay: 5000 });
      this.tweens.add({ targets: skipPrompt, alpha: { from: 0, to: 0.85 }, duration: 600, delay: 600,
        yoyo: true, repeat: -1 });

      // Click or any key skips straight to the character select
      const proceed = () => {
        this.cameras.main.fadeOut(280, 0, 0, 0);
        this.time.delayedCall(300, () => this.scene.start('CharacterSelect'));
      };
      this.input.on('pointerdown', proceed);
      this.input.keyboard.on('keydown', proceed);

      // Auto-advance after the last line has been fully visible for ~2.5s
      this.time.delayedCall(8200, () => {
        if (this.scene.isActive('StoryIntro')) proceed();
      });
    }

    update(time, delta) {
      const dt = delta / 1000;
      const g = this.rainGfx;
      g.clear();
      g.lineStyle(1, 0x4a7aaa, 0.30);
      for (const r of this.bgRain) {
        r.y += r.v * dt;
        if (r.y > GH + 10) { r.y = -10; r.x = Math.random() * GW; }
        g.lineBetween(r.x, r.y, r.x - 4, r.y + 14);
      }
    }
  }

  class CharacterSelectScene extends Phaser.Scene {
    constructor() { super({ key: 'CharacterSelect' }); }

    create() {
      this.cameras.main.setBackgroundColor('#050510');

      // Dark gradient vignette background
      const bg = this.add.graphics();
      bg.fillGradientStyle(0x0a0510, 0x0a0510, 0x1a0a0a, 0x1a0a0a, 1);
      bg.fillRect(0, 0, GW, GH);

      // Subtle brick texture hint — random dim rects
      const brick = this.add.graphics();
      brick.fillStyle(0x1a0e0e, 0.25);
      for (let i = 0; i < 60; i++) {
        const bx = Math.random() * GW;
        const by = Math.random() * GH;
        brick.fillRect(bx, by, 40, 14);
      }

      // Background rain
      this.bgRain = [];
      for (let i = 0; i < 120; i++) {
        this.bgRain.push({
          x: Math.random() * GW,
          y: Math.random() * GH,
          v: 380 + Math.random() * 260,
        });
      }
      this.rainGfx = this.add.graphics();
      this.rainGfx.setDepth(5);

      this.drawTitle();
      this.drawCards();
      this.drawFooter();
    }

    drawTitle() {
      const t = 'PRCARNAGE';

      // Red neon glow — layered texts with different stroke thicknesses
      const glowLayers = [
        { thick: 18, alpha: 0.18, color: '#550000' },
        { thick: 12, alpha: 0.28, color: '#880000' },
        { thick: 6,  alpha: 0.55, color: '#cc0000' },
      ];
      glowLayers.forEach(layer => {
        this.add.text(GW / 2, 82, t, {
          fontFamily: 'Impact, "Arial Black", sans-serif',
          fontSize: '86px',
          color: layer.color,
          stroke: layer.color,
          strokeThickness: layer.thick,
        }).setOrigin(0.5).setAlpha(layer.alpha);
      });

      // Core text
      const title = this.add.text(GW / 2, 82, t, {
        fontFamily: 'Impact, "Arial Black", sans-serif',
        fontSize: '86px',
        color: '#ff3b3b',
        stroke: '#2a0000',
        strokeThickness: 3,
      }).setOrigin(0.5);

      // Soft pulse on title
      this.tweens.add({
        targets: title, alpha: { from: 0.85, to: 1 },
        duration: 1100, yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
      });

      // Tagline
      this.add.text(GW / 2, 142, 'MANCHESTER\'S FINEST  —  PICK YOUR LAD', {
        fontFamily: 'monospace',
        fontSize: '16px',
        color: '#887070',
        letterSpacing: 4,
      }).setOrigin(0.5).setAlpha(0.85);
    }

    drawCards() {
      // Grid: 3 columns x 2 rows
      const cardW = 380, cardH = 260;
      const gapX = 24, gapY = 24;
      const gridW = cardW * 3 + gapX * 2;
      const startX = (GW - gridW) / 2;
      const startY = 180;

      CHAR_ORDER.forEach((id, i) => {
        const col = i % 3;
        const row = Math.floor(i / 3);
        const x = startX + col * (cardW + gapX);
        const y = startY + row * (cardH + gapY);
        this.drawCard(x, y, cardW, cardH, CHARACTERS[id]);
      });
    }

    drawCard(x, y, w, h, char) {
      const unlocked = char.unlocked;

      // Card background
      const bg = this.add.rectangle(x + w / 2, y + h / 2, w, h,
        unlocked ? 0x1a0e0e : 0x0f0f0f).setStrokeStyle(
        2, unlocked ? 0xcc3333 : 0x2a2a2a);

      // Portrait panel
      const portX = x + 20, portY = y + 20, portW = 110, portH = 180;
      this.add.rectangle(portX + portW / 2, portY + portH / 2, portW, portH,
        0x050505).setStrokeStyle(1, 0x2a2222);

      // Draw the character, scaled up
      const draw = CHARACTER_DRAWERS[char.id];
      const holder = this.add.graphics().setPosition(portX + portW / 2, portY + portH / 2 + 24);
      holder.setScale(1.6);
      draw(holder, 0, 0);
      if (!unlocked) holder.setAlpha(0.2);

      // Name
      const nameColor = unlocked ? '#ffecec' : '#555';
      this.add.text(x + 150, y + 18, char.name, {
        fontFamily: 'Impact', fontSize: '34px', color: nameColor,
        stroke: unlocked ? '#440000' : '#000', strokeThickness: 2,
      });

      // Stats (bars)
      const statLabels = [
        { key: 'speed',  label: 'SPEED'  },
        { key: 'hp',     label: 'HP'     },
        { key: 'damage', label: 'DAMAGE' },
      ];
      const statX = x + 150;
      const statY = y + 65;
      statLabels.forEach((s, i) => {
        const sy = statY + i * 28;
        const val = char.stats[s.key];
        this.add.text(statX, sy, s.label, {
          fontFamily: 'monospace', fontSize: '12px',
          color: unlocked ? '#b08f8f' : '#3a3a3a',
          letterSpacing: 2,
        });
        // Bar background
        this.add.rectangle(statX + 80, sy + 8, 150, 9, 0x0a0a0a)
          .setOrigin(0, 0.5).setStrokeStyle(1, 0x2a2a2a);
        // Fill
        const fill = unlocked ? 0xff4444 : 0x333333;
        this.add.rectangle(statX + 80, sy + 8, val * 15, 9, fill)
          .setOrigin(0, 0.5);
        // Notches
        for (let n = 1; n < 10; n++) {
          this.add.rectangle(statX + 80 + n * 15, sy + 8, 1, 9, 0x0a0a0a)
            .setOrigin(0.5);
        }
      });

      // Powerup
      this.add.text(x + 150, y + 160, char.powerup, {
        fontFamily: 'monospace', fontSize: '14px',
        color: unlocked ? '#ffb733' : '#444',
        fontStyle: 'bold',
      });
      this.add.text(x + 150, y + 180, char.powerupDesc, {
        fontFamily: 'monospace', fontSize: '11px',
        color: unlocked ? '#887070' : '#333',
      });

      // Action button
      const btnY = y + h - 28;
      const btnBg = this.add.rectangle(x + w / 2, btnY, w - 20, 40,
        unlocked ? 0xaa0000 : 0x151515)
        .setStrokeStyle(1, unlocked ? 0xff5555 : 0x333333);
      const btnTxt = this.add.text(x + w / 2, btnY,
        unlocked ? 'SELECT' : 'COMING SOON', {
          fontFamily: 'Impact', fontSize: '22px',
          color: unlocked ? '#ffffff' : '#555',
          letterSpacing: 3,
        }).setOrigin(0.5);

      if (unlocked) {
        btnBg.setInteractive({ useHandCursor: true });
        btnBg.on('pointerover', () => {
          btnBg.setFillStyle(0xff2222);
          btnTxt.setColor('#ffff88');
        });
        btnBg.on('pointerout', () => {
          btnBg.setFillStyle(0xaa0000);
          btnTxt.setColor('#ffffff');
        });
        btnBg.on('pointerdown', () => {
          this.cameras.main.flash(250, 255, 30, 30);
          this.time.delayedCall(180, () => {
            this.scene.start('Game', { character: char.id });
          });
        });
      }
    }

    drawFooter() {
      this.add.text(GW / 2, GH - 22,
        'WASD MOVE  ·  SPACE JUMP (PRESS TWICE FOR DOUBLE JUMP)  ·  S+DIR SLIDE  ·  SHIFT BULLET TIME  ·  MOUSE AIM + CLICK SHOOT  ·  E POWERUP  ·  F TONGUE  ·  TAB SWITCH  ·  ESC PAUSE',
        { fontFamily: 'monospace', fontSize: '12px', color: '#665050', letterSpacing: 1 }
      ).setOrigin(0.5);
    }

    update(time, delta) {
      // Rain
      const dt = delta / 1000;
      const g = this.rainGfx;
      g.clear();
      g.lineStyle(1, 0x4a7aaa, 0.35);
      for (const r of this.bgRain) {
        r.y += r.v * dt;
        if (r.y > GH + 10) {
          r.y = -10;
          r.x = Math.random() * GW;
        }
        g.lineBetween(r.x, r.y, r.x - 4, r.y + 14);
      }
    }
  }

  // =============================================================================
  // SCENE: GAME
  // =============================================================================
  class GameScene extends Phaser.Scene {
    constructor() { super({ key: 'Game' }); }

    init(data) {
      this.selectedCharacter = (data && data.character) || 'connor';
    }

    create() {
      this.physics.world.setBounds(0, 0, WORLD_W, GH);
      this.cameras.main.setBounds(0, 0, WORLD_W, GH);
      this.cameras.main.setBackgroundColor('#05060a');

      // Generate textures
      this.makeAllTextures();

      // Layers (in draw order)
      this.createSkyAndFarBuildings();   // layer 1 far
      this.createMidBuildings();         // layer 2
      this.createNearWalls();            // layer 3 near
      this.createNeonSigns();            // neon layer (near)
      this.createGround();               // street surface
      this.createPuddles();              // wet reflections
      this.createPlatforms();

      // Entities
      this.createPlayer();
      this.createEnemies();
      this.createPowerupPickup();
      this.createBullets();

      // Particles / rain
      this.createRainSystem();

      // HUD and overlays
      this.createHUD();
      this.createBulletTimeOverlay();

      // Input + physics collisions + camera
      this.createInputs();
      this.setupCollisions();
      this.setupCamera();

      // Game state
      this.kills = 0;
      this.bulletTimeEnergy = 100;
      this.bulletTimeActive = false;
      this.gameOver = false;
      this.lastShotTime = 0;
      this.powerupHeld = false;
      this.powerupActive = false;
      this.powerupTimer = 0;
      this.powerupMax = 1;
      this.powerupKind = null;
      // v6: pause and quick-switch state
      this.paused = false;
      this.quickSwitchOpen = false;

      // Wave state — infinite waves; game ends only on death
      this.wave = 1;
      this.waveTransitioning = false;

      // Intro flash + first wave banner with location title
      this.cameras.main.flash(400, 255, 255, 255);
      this.time.delayedCall(500, () => this.showWaveBanner(1));
    }

    // -----------------------------------------------------------------------
    makeAllTextures() {
      // Player textures — all 6 characters get a sprite
      makeCharTexture(this, 'player_connor',          drawConnor,  {});
      makeCharTexture(this, 'player_connor_gangster', drawConnor,  { gangster: true });
      makeCharTexture(this, 'player_callum',          drawCallum);
      makeCharTexture(this, 'player_finley',          drawFinley);
      makeCharTexture(this, 'player_declan',          drawDeclan);
      makeCharTexture(this, 'player_aaron',           drawAaron);
      makeCharTexture(this, 'player_charlie',         drawCharlie);

      // Enemies
      makeCharTexture(this, 'enemy_chav',    drawChav);
      makeCharTexture(this, 'enemy_bouncer', drawBouncer);
      makeCharTexture(this, 'enemy_hoodie',  drawHoodie);

      // Tongue projectile (Frog mode) — v5: bright green horizontal rectangle
      const tg = this.make.graphics({ add: false });
      // Outer glow halo
      tg.fillStyle(0x66ff66, 0.35); tg.fillRect(0, 1, 32, 12);
      // Main body
      tg.fillStyle(0x33cc33, 1);    tg.fillRect(0, 4, 30, 6);
      // Bright tip
      tg.fillStyle(0x88ff88, 1);    tg.fillRect(24, 2, 8, 10);
      tg.generateTexture('tongue', 32, 14);
      tg.destroy();

      // v5: Player bullet — bright glowing white/yellow circle with halo

    // -----------------------------------------------------------------------
    createSkyAndFarBuildings() {
      // Sky gradient — deep purple/black, hint of orange city glow
      const sky = this.add.graphics().setScrollFactor(0);
      sky.fillGradientStyle(0x080215, 0x080215, 0x200a10, 0x200a10, 1);
      sky.fillRect(0, 0, GW, GH);

      // Distant city silhouette — slowest parallax
      const far = this.add.graphics().setScrollFactor(0.15);
      let fx = -200;
      const rngFar = mulberry32(1337);
      while (fx < WORLD_W + 200) {
        const bw = 70 + rngFar() * 120;
        const bh = 130 + rngFar() * 220;
        const by = 350 - bh + 300;
        far.fillStyle(0x0a0a18, 1);
        far.fillRect(fx, by, bw, bh);
        // Windows (sparse dim yellow)
        for (let wy = by + 20; wy < by + bh - 15; wy += 22) {
          for (let wx = fx + 10; wx < fx + bw - 10; wx += 16) {
            if (rngFar() > 0.7) {
              far.fillStyle(rngFar() > 0.5 ? 0x443310 : 0x1a1a30, 1);
              far.fillRect(wx, wy, 6, 8);
            }
          }
        }
        fx += bw + 10 + rngFar() * 20;
      }
    }

    createMidBuildings() {
      // Mid layer — brick shops with neon signage slots. Scrolls ~0.45.
      const mid = this.add.graphics().setScrollFactor(0.45);
      let mx = -200;
      const rng = mulberry32(4242);
      while (mx < WORLD_W + 200) {
        const bw = 140 + rng() * 140;
        const bh = 240 + rng() * 120;
        const by = GROUND_Y - bh;
        // Brick color variants
        const brickCol = [0x2a1818, 0x331a14, 0x261212][Math.floor(rng() * 3)];
        mid.fillStyle(brickCol, 1);
        mid.fillRect(mx, by, bw, bh);
        // Brick joints
        mid.fillStyle(0x1a0c0c, 1);
        for (let by2 = by; by2 < by + bh; by2 += 10) {
          mid.fillRect(mx, by2, bw, 1);
        }
        for (let bx2 = mx; bx2 < mx + bw; bx2 += 24) {
          mid.fillRect(bx2, by, 1, bh);
        }
        // Windows — lit rooms
        for (let wy = by + 40; wy < by + bh - 60; wy += 50) {
          for (let wx = mx + 20; wx < mx + bw - 30; wx += 44) {
            if (rng() > 0.4) {
              const lit = rng() > 0.5;
              mid.fillStyle(lit ? 0x776622 : 0x1a1a10, 1);
              mid.fillRect(wx, wy, 20, 26);
              // window cross
              mid.fillStyle(0x050505, 1);
              mid.fillRect(wx + 9, wy, 2, 26);
              mid.fillRect(wx, wy + 12, 20, 2);
            }
          }
        }
        // Ground floor (shopfront) darker
        mid.fillStyle(0x151010, 1);
        mid.fillRect(mx, by + bh - 60, bw, 60);
        // Shopfront door
        mid.fillStyle(0x0a0a0a, 1);
        mid.fillRect(mx + bw / 2 - 12, by + bh - 56, 24, 56);
        mx += bw + 6 + rng() * 20;
      }
    }

    createNearWalls() {
      // Foreground walls/trash — closest parallax (0.8)
      // These live below GROUND_Y and create the street floor edge
      const near = this.add.graphics().setScrollFactor(0.8);

      // Back wall strip behind the ground
      near.fillStyle(0x0f0a0a, 1);
      near.fillRect(0, GROUND_Y - 80, WORLD_W, 80);

      const rng = mulberry32(9090);
      // Scattered foreground details — bins, posters
      for (let i = 0; i < 40; i++) {
        const x = rng() * WORLD_W;
        const w = 26 + rng() * 20;
        const h = 32 + rng() * 20;
        near.fillStyle(0x181818, 1);
        near.fillRect(x, GROUND_Y - h, w, h);
        // Lid
        near.fillStyle(0x2a2a2a, 1);
        near.fillRect(x - 2, GROUND_Y - h - 3, w + 4, 3);
        // Graffiti dot
        if (rng() > 0.5) {
          near.fillStyle([0xff3377, 0x33ff88, 0x33aaff][Math.floor(rng() * 3)], 0.35);
          near.fillRect(x + 4, GROUND_Y - h / 2, 8, 8);
        }
      }
    }

    // v5: Neon signs are mounted as physical boxes bolted to building walls,
    // not floating in the sky. Each sign gets a back-plate, four corner bolts,
    // and a single small ground light pool (the duplicate large pool in
    // createGround has also been removed).
    createNeonSigns() {
      this.neonLightPools = [];

      NEON_SIGNS.forEach(sign => {
        const col = sign.color;
        const w = sign.text.length * 14 + 24;
        const h = 42;
        const boxX = sign.x, boxY = sign.y;

        // v6: Halo circles removed entirely — signs are now physical
        // panels bolted to the wall, no floating glow background.

        // Mount plate — slightly larger than the frame, dark metal
        const plate = this.add.graphics();
        plate.fillStyle(0x1a1a1e, 1);
        plate.fillRect(boxX - w / 2 - 4, boxY - 4, w + 8, h + 8);
        // Plate shadow strip (suggests it stands proud of the wall)
        plate.fillStyle(0x000000, 0.55);
        plate.fillRect(boxX - w / 2 - 6, boxY + h + 4, w + 12, 3);

        // Sign body
        const frame = this.add.graphics();
        frame.fillStyle(0x070708, 1);
        frame.fillRect(boxX - w / 2, boxY, w, h);
        frame.lineStyle(2, col, 1);
        frame.strokeRect(boxX - w / 2, boxY, w, h);

        // Four corner bolts holding the sign to the wall
        const bolts = this.add.graphics();
        bolts.fillStyle(0x666666, 1);
        const bx1 = boxX - w / 2 - 1, bx2 = boxX + w / 2 + 1;
        const by1 = boxY - 1,         by2 = boxY + h + 1;
        [[bx1, by1], [bx2, by1], [bx1, by2], [bx2, by2]].forEach(([x, y]) => {
          bolts.fillCircle(x, y, 2.2);
          bolts.fillStyle(0x222222, 1);
          bolts.fillCircle(x, y, 0.8);
          bolts.fillStyle(0x666666, 1);
        });

        // Glowing text — coloured glow + bright white core
        const colHex = '#' + col.toString(16).padStart(6, '0');
        const txtGlow = this.add.text(boxX, boxY + h / 2, sign.text, {
          fontFamily: 'Impact', fontSize: '22px',
          color: colHex, stroke: colHex, strokeThickness: 8,
        }).setOrigin(0.5).setAlpha(0.45);

        const txt = this.add.text(boxX, boxY + h / 2, sign.text, {
          fontFamily: 'Impact', fontSize: '22px',
          color: '#ffffff',
        }).setOrigin(0.5);

        // Subtle flicker on the bright elements only
        this.tweens.add({
          targets: [txt, txtGlow],
          alpha: { from: 1, to: 0.85 },
          duration: 90 + Math.random() * 100,
          yoyo: true, repeat: -1,
        });

        // v6: SINGLE small subtle ellipse on the ground beneath each sign
        // (kept small per spec — no large floating glow anywhere).
        const pool = this.add.graphics();
        pool.fillStyle(col, 0.22);
        pool.fillEllipse(boxX, GROUND_Y - 2, 100, 12);
        pool.setDepth(-1);
        this.neonLightPools.push({ g: pool, baseX: boxX, color: col });
      });
    }

    createGround() {
      // Wet street — dark base with subtle reflective highlights
      const gnd = this.add.graphics();
      // Street body
      gnd.fillStyle(0x0e0e14, 1);
      gnd.fillRect(0, GROUND_Y, WORLD_W, GH - GROUND_Y);
      // Top highlight line — curb
      gnd.fillStyle(0x2a2a34, 1);
      gnd.fillRect(0, GROUND_Y, WORLD_W, 2);
      // Wet sheen — thin semi-transparent highlight bands
      gnd.fillStyle(0x4a6a8a, 0.06);
      gnd.fillRect(0, GROUND_Y + 4, WORLD_W, 14);
      gnd.fillStyle(0x6a8abf, 0.04);
      gnd.fillRect(0, GROUND_Y + 16, WORLD_W, 20);

      // v5: Removed the second large neon ground pool — single small pool
      // is now drawn in createNeonSigns() above for a less floaty look.

      // Physical ground body (invisible collider)
      this.groundBody = this.physics.add.staticGroup();
      const floor = this.add.rectangle(WORLD_W / 2, GROUND_Y + 50, WORLD_W, 100, 0x000000, 0);
      this.physics.add.existing(floor, true);
      this.groundBody.add(floor);
    }

    createPuddles() {
      // A few wet puddles on the ground with subtle ripples
      this.puddles = [];
      const puddleXs = [220, 640, 1080, 1480, 1840, 2180, 2520, 2820];
      puddleXs.forEach(x => {
        const g = this.add.graphics();
        g.fillStyle(0x223344, 0.45);
        g.fillEllipse(x, GROUND_Y + 6, 120, 14);
        g.fillStyle(0x445577, 0.35);
        g.fillEllipse(x, GROUND_Y + 6, 80, 8);
        // Ripple markers updated each frame
        this.puddles.push({ x, g, phase: Math.random() * Math.PI * 2 });
      });
    }

    // v6: Platforms are now one-way (jump up through, land on top). Each
    // kind has its own texture: concrete platform, brick rooftop, grated
    // fire escape, or a wheelie bin you can hop onto. The body's left/
    // right/down collision faces are disabled so things only collide on top.
    createPlatforms() {
      this.platforms = this.physics.add.staticGroup();
      PLATFORM_DATA.forEach(p => {
        const kind = p.kind || 'platform';
        let plat;
        if (kind === 'bin') {
          plat = this.add.image(p.x, p.y, 'platform_bin').setOrigin(0.5, 0.5);
        } else {
          const tex =
            kind === 'rooftop'    ? 'platform_rooftop'
          : kind === 'fireescape' ? 'platform_fireescape'
          : 'platform';
          const h = kind === 'fireescape' ? 12 : (kind === 'rooftop' ? 22 : 20);
          plat = this.add.tileSprite(p.x, p.y, p.w, h, tex).setOrigin(0.5);
        }
        this.physics.add.existing(plat, true);
        // One-way: only collide from above. Player/enemy can jump UP through.
        plat.body.checkCollision.down  = false;
        plat.body.checkCollision.left  = false;
        plat.body.checkCollision.right = false;
        this.platforms.add(plat);
      });
    }

    // -----------------------------------------------------------------------
    createPlayer() {
      const charId = this.selectedCharacter;
      const stats = CHARACTERS[charId].stats;
      // Each character has its own player texture now (v3)
      this.player = this.physics.add.sprite(120, GROUND_Y - 40, 'player_' + charId);
      this.player.setCollideWorldBounds(true);
      this.player.body.setSize(28, 56);
      this.player.body.setOffset(11, 12);

      // Player runtime state
      this.playerState = {
        id: charId,
        hp: statToHP(stats.hp),
        maxHp: statToHP(stats.hp),
        baseSpeed: statToSpeed(stats.speed),
        damage: statToDamage(stats.damage),
        facing: 1,
        lastGroundedAt: 0,
        lastJumpPressedAt: -99999,
        // v6: double jump system — refill on ground touch
        jumpsRemaining: 2,
        maxJumps: 2,
        isSliding: false,
        slideEndsAt: 0,
        isCrouching: false,
        invincibleUntil: 0,
      };

      // v5 Connor arm/gun overlay — visible arm extending from the body
      // holding a pistol. Drawn into a Graphics object once, then positioned
      // and rotated each frame in updatePlayer to follow the mouse cursor.
      // Only created (and displayed) when the selected character is Connor.
      if (charId === 'connor') {
        this.connorArm = this.add.graphics().setDepth(11);
        this.drawConnorArm(this.connorArm);
      }
    }

    // v5: Draw Connor's right arm + pistol so it points to the right (+x),
    // ready to be rotated around (0,0) to aim at the mouse cursor.
    drawConnorArm(g) {
      g.clear();
      // Sleeve (jacket sleeve) — extending forward from shoulder
      g.fillStyle(0x262626, 1);
      g.fillRect(0, -4, 22, 8);
      // Hand (skin)
      g.fillStyle(0xf0c49a, 1);
      g.fillCircle(22, 0, 4);
      // Pistol body — black with subtle highlight
      g.fillStyle(0x111111, 1);
      g.fillRect(22, -3, 16, 6);
      // Pistol slide top
      g.fillStyle(0x2a2a2a, 1);
      g.fillRect(22, -4, 16, 2);
      // Trigger guard ring
      g.fillStyle(0x1a1a1a, 1);

      // Barrel tip — small light dot

    createEnemies() {
      this.enemies = this.physics.add.group();
      this.enemyData = new Map(); // sprite -> state
      // Wave 1 uses the hand-placed ENEMY_SPAWNS list (6 enemies)
      ENEMY_SPAWNS.forEach(spawn => this.spawnEnemy(spawn.x, spawn.type, 1));
    }

    // v6: spawnEnemy now scales speed by wave (capped at 2x base) and tags
    // each enemy with its wave so AI can decide whether to throw grenades.
    spawnEnemy(x, type, waveN) {
      const wave = waveN || this.wave || 1;
      const stats = ENEMY_STATS[type];
      const speedMul = waveSpeedMul(wave);
      const tex = 'enemy_' + type;
      const e = this.enemies.create(x, GROUND_Y - 80, tex);
      e.setCollideWorldBounds(true);
      e.body.setSize(28, 56);
      e.body.setOffset(11, 12);
      if (type === 'bouncer') {
        e.setScale(1.2);
        e.body.setSize(28, 56);
        e.body.setOffset(11, 12);
      }
      e.body.setDragX(200);
      this.enemyData.set(e, {
        type, wave,
        hp: stats.hp, maxHp: stats.hp,
        // Apply wave speed scaling (capped at 2x in waveSpeedMul)
        speed: stats.speed * speedMul,
        damage: stats.damage, touchDmg: stats.touchDmg,
        patrolOrigin: x,
        patrolDir: Math.random() > 0.5 ? 1 : -1,
        lastShotAt: 0,
        alive: true,
        ragdollVx: 0, ragdollVy: 0, ragdollRot: 0,
        chargeUntil: 0,
        nextActionAt: 0,
        // v6: grenade throw state
        nextGrenadeAt: this.time.now + 3500 + Math.random() * 4000,
        // v6: AI jump state — used to hop onto platforms
        nextAiJumpAt: 0,
      });
      return e;
    }

    // v6: Waves 2+ — count and composition both scale by wave number.
    // Wave 1 = 6 (handled in createEnemies), wave 2 = 8, wave 3 = 10,
    // then +2 per wave. Composition shifts per waveComposition().
    spawnWave(n) {
      const count = waveEnemyCount(n);
      const pool = waveComposition(n);
      // Distribute spawn xs evenly across the world
      for (let i = 0; i < count; i++) {
        const t = (i + 0.5) / count;
        const baseX = 200 + t * (WORLD_W - 400);
        const jitter = (Math.random() - 0.5) * 120;
        const type = pool[Math.floor(Math.random() * pool.length)];
        this.spawnEnemy(baseX + jitter, type, n);
      }
    }

    createPowerupPickup() {
      // Random spawn mid-level; respawns periodically
      this.powerupOrb = this.physics.add.sprite(1500, GROUND_Y - 40, 'powerup_orb');
      this.powerupOrb.setCollideWorldBounds(true);
      this.powerupOrb.body.setAllowGravity(false);
      this.powerupOrb.setDepth(10);
      // Hovering tween
      this.tweens.add({
        targets: this.powerupOrb,
        y: GROUND_Y - 60,
        duration: 900, yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
      });
      // Pulse glow
      this.tweens.add({
        targets: this.powerupOrb,
        alpha: { from: 0.75, to: 1 },
        duration: 500, yoyo: true, repeat: -1,
      });
    }

    // v6: Bullets travel in a straight line — no gravity, no arc.
    createBullets() {
      this.bullets      = this.physics.add.group({ allowGravity: false });
      this.enemyBullets = this.physics.add.group({ allowGravity: false });
      // Grenades thrown by enemies — these DO have gravity (proper arc)
      this.grenades     = this.physics.add.group({ allowGravity: true });
    }

    createRainSystem() {
      // Custom rain — 220 drops, wraps around the camera viewport.

          y: Math.random() * GH,
          v: 720 + Math.random() * 360,
          len: 10 + Math.random() * 10,

      this.rainGfx = this.add.graphics().setScrollFactor(0).setDepth(30);

      // Particle manager for splashes (rain) and blood
      this.splashFX = this.add.particles(0, 0, 'splash', {
        speed: { min: 80, max: 180 },
        angle: { min: 240, max: 300 },
        scale: { start: 0.8, end: 0 },
        alpha: { start: 0.9, end: 0 },
        lifespan: 350,
        gravityY: 400,
        emitting: false,
      }).setDepth(20);

      this.bloodFX = this.add.particles(0, 0, 'blood', {
        speed: { min: 160, max: 360 },
        angle: { min: 200, max: 340 },
        scale: { start: 1.2, end: 0 },
        alpha: { start: 1, end: 0 },
        lifespan: 550,
        gravityY: 900,
        emitting: false,
      }).setDepth(20);

      this.sparkFX = this.add.particles(0, 0, 'spark', {
        speed: { min: 40, max: 160 },
        angle: { min: 0, max: 360 },
        scale: { start: 1, end: 0 },
        alpha: { start: 1, end: 0 },
        lifespan: 200,
        emitting: false,
      }).setDepth(25);

      // v5: Player muzzle flash — large bright yellow burst
      this.muzzleFX = this.add.particles(0, 0, 'trail_yellow', {
        speed: { min: 60, max: 220 },

    // v6: Build the small character row at the top centre of the HUD.
    createCharSwitcherRow() {
      const iconW = 44, iconH = 56, gap = 8;
      const total = CHAR_ORDER.length * iconW + (CHAR_ORDER.length - 1) * gap;
      const startX = GW / 2 - total / 2;
      const y = 8;
      this.charSwitcherIcons = [];
      CHAR_ORDER.forEach((id, i) => {
        const x = startX + i * (iconW + gap);
        const bg = this.add.rectangle(x + iconW / 2, y + iconH / 2, iconW, iconH,
          0x0a0a0a, 0.85).setStrokeStyle(2, 0x554444).setScrollFactor(0).setDepth(200);
        // Portrait — use the existing player_<id> texture, scaled to fit
        const portrait = this.add.image(x + iconW / 2, y + iconH / 2,
          'player_' + id).setScrollFactor(0).setDepth(201).setScale(0.55);
        bg.setInteractive({ useHandCursor: true });
        bg.on('pointerdown', () => {
          if (this.gameOver || this.paused) return;
          if (id !== this.selectedCharacter) this.switchCharacter(id);
        });
        this.charSwitcherIcons.push({ id, bg, portrait });
        this.hud.add(bg); this.hud.add(portrait);
      });
      this.refreshCharSwitcherRow();
    }

    // v6: Highlight the currently-selected character in the switcher row.
    refreshCharSwitcherRow() {
      if (!this.charSwitcherIcons) return;
      this.charSwitcherIcons.forEach(item => {
        if (item.id === this.selectedCharacter) {
          item.bg.setStrokeStyle(3, 0xffaa22);
          item.bg.setFillStyle(0x331a08, 0.95);
          item.portrait.setAlpha(1);
        } else {
          item.bg.setStrokeStyle(2, 0x554444);
          item.bg.setFillStyle(0x0a0a0a, 0.85);
          item.portrait.setAlpha(0.6);
        }
      });
    }

    // v6: Switch character mid-game. Resets HP to 100, keeps wave + kill
    // count, cancels any active powerup, rebuilds Connor's arm overlay
    // appropriately.
    switchCharacter(newCharId) {
      if (!CHARACTERS[newCharId]) return;
      // Cancel any active powerup cleanly
      if (this.powerupActive) this.deactivatePowerup();
      // Drop the old Connor arm if it exists
      if (this.connorArm) {
        this.connorArm.destroy();
        this.connorArm = null;
      }
      this.selectedCharacter = newCharId;
      // Swap texture & rebuild base player state
      this.player.setTexture('player_' + newCharId);
      const stats = CHARACTERS[newCharId].stats;
      this.playerState.id = newCharId;
      this.playerState.hp = 100;          // v6 spec: switch resets HP to 100
      this.playerState.maxHp = 100;
      this.playerState.baseSpeed = statToSpeed(stats.speed);
      this.playerState.damage = statToDamage(stats.damage);
      this.playerState.invincibleUntil = this.time.now + 600; // brief grace
      // Recreate the rotating arm if Connor was selected
      if (newCharId === 'connor') {
        this.connorArm = this.add.graphics().setDepth(11);
        this.drawConnorArm(this.connorArm);
      }
      // Update HUD name + switcher highlight
      this.hudName.setText(CHARACTERS[newCharId].name);
      this.refreshCharSwitcherRow();
      // Punchy feedback
      this.cameras.main.flash(180, 255, 220, 80);
      this.showFloatingText(this.player.x, this.player.y - 80,
        CHARACTERS[newCharId].name, '#ffee44');
    }

    // -----------------------------------------------------------------------
    // v5: Bullet time overlay — NO greyscale, NO full-screen blue tint.
    // Just a dark blue edge vignette so the world keeps full colour.
    createBulletTimeOverlay() {
      // Dark blue edge vignette only (full colour preserved in centre)
      this.vignette = this.add.graphics().setScrollFactor(0).setDepth(102);
      this.vignette.setAlpha(0);
      this.redrawVignette(this.vignette);
    }

    redrawVignette(g) {
      g.clear();
      // Dark blue rings stacking inward — heaviest at edges
      const cx = GW / 2, cy = GH / 2;
      for (let i = 0; i < 40; i++) {
        const t = i / 40;
        const r = 200 + t * 700;
        const a = 0.04 + t * 0.05;
        g.lineStyle(28, 0x0a1a44, a);
        g.strokeEllipse(cx, cy, r * 1.6, r);
      }
      // Solid dark blue screen-edge bands for a clean cinematic vignette
      g.fillStyle(0x051030, 0.7);
      g.fillRect(0, 0, GW, 50);
      g.fillRect(0, GH - 50, GW, 50);
      g.fillRect(0, 0, 50, GH);
      g.fillRect(GW - 50, 0, 50, GH);
    }

    createInputs() {
      this.keys = this.input.keyboard.addKeys({
        left: Phaser.Input.Keyboard.KeyCodes.A,
        right: Phaser.Input.Keyboard.KeyCodes.D,
        up: Phaser.Input.Keyboard.KeyCodes.W,
        down: Phaser.Input.Keyboard.KeyCodes.S,
        jump: Phaser.Input.Keyboard.KeyCodes.SPACE,
        bulletTime: Phaser.Input.Keyboard.KeyCodes.SHIFT,
        powerup: Phaser.Input.Keyboard.KeyCodes.E,
        tongue: Phaser.Input.Keyboard.KeyCodes.F, // Frog mode tongue
      });

      // Click to shoot — but ignore clicks on HUD (they handle themselves)
      this.input.on('pointerdown', pointer => {
        if (this.gameOver || this.paused) return;
        this.shoot(pointer);
      });

      // v6: TAB cycles character switcher (closes if open). ESC pauses.
      this.input.keyboard.on('keydown-TAB', e => {
        if (e && e.preventDefault) e.preventDefault();
        if (this.gameOver) return;
        this.toggleQuickSwitch();
      });
      this.input.keyboard.on('keydown-ESC', () => {
        if (this.gameOver) return;
        this.togglePause();
      });

      // Track edge detection for repeated keys
      this.jumpWasDown = false;
      this.sWasDown = false;
      this.eWasDown = false;
      this.fWasDown = false;
    }

    // v6: ESC pause menu — RESUME, SWITCH CHARACTER, RESTART, QUIT TO MENU
    togglePause() {
      if (this.paused) {
        this.resumeGame();
      } else {
        this.pauseGame();
      }
    }

    pauseGame() {
      if (this.paused) return;
      this.paused = true;
      // Close any quick-switcher first
      if (this.quickSwitchOpen) this.closeQuickSwitch();
      this.physics.world.pause();
      this.tweens.pauseAll();

      const c = this.add.container(0, 0).setScrollFactor(0).setDepth(230);
      // Dim background
      c.add(this.add.rectangle(0, 0, GW, GH, 0x000000, 0.72)

      c.add(this.add.text(GW / 2, 130, 'PAUSED', {
        fontFamily: 'Impact', fontSize: '90px', color: '#ffffff',
        stroke: '#221100', strokeThickness: 5, letterSpacing: 8,
      }).setOrigin(0.5));
      // Current stats
      const statTxt =
        CHARACTERS[this.selectedCharacter].name +
        '   ·   WAVE ' + this.wave +
        '   ·   KILLS ' + this.kills +
        '   ·   HP ' + Math.max(0, Math.round(this.playerState.hp)) +
        ' / ' + this.playerState.maxHp;
      c.add(this.add.text(GW / 2, 210, statTxt, {
        fontFamily: 'monospace', fontSize: '18px', color: '#aaaaaa',
        letterSpacing: 2,
      }).setOrigin(0.5));

      // Buttons
      const btn = (label, cy, onClick, colour) => {
        const bg = this.add.rectangle(GW / 2, cy, 380, 56,
          colour || 0x1a1a22, 0.95)
          .setStrokeStyle(2, 0x665544)
          .setInteractive({ useHandCursor: true });

          fontFamily: 'Impact', fontSize: '28px', color: '#ffffff',
          letterSpacing: 4,
        }).setOrigin(0.5);
        bg.on('pointerover', () => { bg.setFillStyle(0x44221a); t.setColor('#ffee66'); });
        bg.on('pointerout',  () => { bg.setFillStyle(colour || 0x1a1a22); t.setColor('#ffffff'); });
        bg.on('pointerdown', onClick);
        c.add(bg); c.add(t);
      };
      btn('RESUME',           300, () => this.resumeGame());
      btn('SWITCH CHARACTER', 372, () => {
        this.resumeGame();
        this.openQuickSwitch();
      });
      btn('RESTART',          444, () => {
        this.scene.restart({ character: this.selectedCharacter });
      });
      btn('QUIT TO MENU',     516, () => {
        this.scene.start('CharacterSelect');
      }, 0x331111);

      c.add(this.add.text(GW / 2, GH - 30, 'ESC TO RESUME', {
        fontFamily: 'monospace', fontSize: '12px', color: '#665544',
        letterSpacing: 4,
      }).setOrigin(0.5));

      this.pauseContainer = c;
